<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mi Cuatrimestre 2025</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0A0C14;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:rgba(255,255,255,0.93);}
input,select,textarea,button{font-family:inherit;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#11131D;}
::-webkit-scrollbar-thumb{background:#2a2d3e;border-radius:3px;}
a{color:inherit;text-decoration:none;}
@keyframes popIn{0%{transform:scale(1)}45%{transform:scale(1.4)}75%{transform:scale(0.88)}100%{transform:scale(1)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.pop{animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);}
.slide{animation:slideDown 0.22s ease;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState, useEffect} = React;

// ── SUBJECTS ──────────────────────────────────────────────────────────────────
const SUBJECTS = [
  {id:"maquinas", name:"Máquinas Eléctricas", short:"MÁQ", color:"#5BA8F5", glow:"rgba(91,168,245,0.15)", finalOnly:false,
   topics:["Introducción y repaso de circuitos","Transformadores — teoría y principio de funcionamiento","Transformadores — circuito equivalente y parámetros","LAB 1: Ensayo indirecto de transformadores","Máquinas de Corriente Continua (CC) — fundamentos","LAB: Ensayo máquina CC y sincrónica","Máquinas trifásicas de CA — Motor Asincrónico","LAB: Motor asincrónico trifásico","Arranque y variación de velocidad","Motores monofásicos y motores especiales"]},
  {id:"io", name:"Investigación Operativa", short:"I.O.", color:"#9D8EF5", glow:"rgba(157,142,245,0.15)", finalOnly:false,
   topics:["Introducción / Prog. Lineal — modelo y formulación (caps. 1-2)","Prog. Entera / Prog. por Metas y No Lineal (cap. 3)","Método Simplex / Casos particulares (cap. 7)","Interpretación Dual — teoría y aplicaciones (cap. 8)","Análisis de Sensibilidad (caps. 4-5)","Análisis Paramétrico","Teoría de Colas — Parte 1: modelos básicos (cap. 6)","Teoría de Colas — Parte 2: modelos avanzados (cap. 6)","Gestión de Stocks — Parte 1: modelos determinísticos (cap. 10)","Gestión de Stocks — Parte 2: modelos con incertidumbre","Camino Crítico / PERT-CPM — redes de proyecto (cap. 9)","Tema integrador final (cap. 12)"]},
  {id:"fluidos", name:"Mecánica de Fluidos", short:"M.F.", color:"#3DD6A0", glow:"rgba(61,214,160,0.15)", finalOnly:false,
   topics:["Propiedades de los fluidos — físicas, termodinámicas, viscosidad, presión de vapor","Estática de fluidos — Pascal, Arquímedes, manometría, superficies sumergidas","Ecuaciones integrales Parte 1 — Reynolds, conservación de masa y cantidad de movimiento","Cinemática de fluidos — Lagrange/Euler, líneas de corriente, campo de velocidades","Ecuaciones integrales Parte 2 — Bernoulli desde Euler, conservación de energía","Análisis Dimensional Parte 1 — Buckingham Pi, grupos adimensionales Re, Fr, Mach, Eu","Análisis Dimensional Parte 2 — semejanza de modelos y escalado","Capa límite Parte 1 — paradoja D'Alambert, espesor, capas laminar y turbulenta","Capa límite Parte 2 — arrastre, práctica de Stokes","Flujo Laminar — Hagen-Poiseuille, caída de presión en tubos","Flujo Turbulento — Nikuradse, Moody, Darcy-Weisbach, pérdidas de carga","Turbomaquinaria — Bombas: tipos, ecuación de Euler, curvas características","Selección de bombas — cavitación, ANPA, serie y paralelo","Escurrimiento en canales — Manning, Chezy, diseño de canales artificiales"]},
  {id:"estadistica", name:"Estadística Aplicada", short:"EST.", color:"#F07B52", glow:"rgba(240,123,82,0.15)", finalOnly:false,
   topics:["Variables aleatorias y distribuciones","Distribución normal y t de Student","Chi-cuadrado y F","Estimación puntual e intervalar","Test de hipótesis — media y varianza","Bondad de ajuste","Regresión lineal simple","Regresión lineal múltiple","ANOVA","Control estadístico de procesos (SPC)"]},
  {id:"finanzas", name:"Finanzas y Evaluación de Proyectos", short:"FIN.", color:"#F0B84A", glow:"rgba(240,184,74,0.15)", finalOnly:false,
   topics:["Introducción — Valor del dinero en el tiempo","Análisis financiero — factores y ejemplos prácticos","Planificación financiera con inflación — Valor Presente","Valor Anual Equivalente (VAE)","Tasa Interna de Retorno (TIR)","TER — Período de reembolso (Payback)","Comparación de alternativas y análisis de reemplazos","Análisis de sensibilidad y punto de equilibrio","Depreciación e Impuesto a las Ganancias (IG)","IVA — aplicaciones en evaluación de proyectos","Inflación en evaluación de proyectos","Aplicaciones de probabilidad al riesgo","Simulación Montecarlo"]},
  {id:"estabilidad", name:"Estabilidad", short:"ESTAB", color:"#7ED458", glow:"rgba(126,212,88,0.15)", finalOnly:true,
   topics:["Sistemas de fuerzas — estática general","Equilibrio de sólidos rígidos","Celosías y estructuras articuladas","Vigas — esfuerzo cortante y momento flector","Diagramas My y Q","Torsión en barras circulares","Tensión normal y tangencial compuestas","Deformaciones — círculo de Mohr","Pandeo de columnas — Euler","Líneas de influencia"]},
  {id:"electrotecnia", name:"Electrotecnia", short:"ELEC", color:"#F46FAE", glow:"rgba(244,111,174,0.15)", finalOnly:true,
   topics:["Circuitos CC — leyes de Kirchhoff","Teoremas de Thevenin y Norton","Análisis de circuitos AC — fasores","Potencia activa, reactiva y aparente","Circuitos trifásicos equilibrados","Circuitos trifásicos desequilibrados","Transformadores — fundamentos","Resonancia y filtros","Transitorios en circuitos RL y RC","Mediciones eléctricas y errores"]},
];

const RES_TYPES = {
  pdf:      {label:"PDF",       icon:"📄", color:"#F07B52"},
  apunte:   {label:"Apunte",    icon:"📝", color:"#5BA8F5"},
  video:    {label:"Video",     icon:"🎬", color:"#9D8EF5"},
  libro:    {label:"Libro",     icon:"📚", color:"#F0B84A"},
  goodnotes:{label:"GoodNotes", icon:"✏️", color:"#F46FAE"},
  link:     {label:"Link",      icon:"🔗", color:"#3DD6A0"},
};

const FINAL_ST = {
  pendiente: {label:"Pendiente",  color:"rgba(255,255,255,0.3)", bg:"rgba(255,255,255,0.05)"},
  inscripto: {label:"Inscripto",  color:"#F0B84A",              bg:"rgba(240,184,74,0.12)"},
  rendido:   {label:"Rendido",    color:"#5BA8F5",              bg:"rgba(91,168,245,0.12)"},
  aprobado:  {label:"Aprobado ✓", color:"#3DD6A0",              bg:"rgba(61,214,160,0.12)"},
};
const PRIO = {
  alta:  {label:"Alta",  color:"#F07B52", bg:"rgba(240,123,82,0.12)"},
  media: {label:"Media", color:"#F0B84A", bg:"rgba(240,184,74,0.10)"},
  baja:  {label:"Baja",  color:"#3DD6A0", bg:"rgba(61,214,160,0.10)"},
};
const COMP_ST = {
  completo:   {label:"Completo",   color:"#3DD6A0", bg:"rgba(61,214,160,0.12)",  icon:"✓"},
  parcial:    {label:"Parcial",    color:"#F0B84A", bg:"rgba(240,184,74,0.12)",  icon:"~"},
  incompleto: {label:"Incompleto", color:"#F07B52", bg:"rgba(240,123,82,0.12)",  icon:"✗"},
};

// ── THEME ─────────────────────────────────────────────────────────────────────
const BG="#0A0C14", CARD="#11131D", CARD2="#181B27";
const BD="rgba(255,255,255,0.07)", BD2="rgba(255,255,255,0.13)";
const T1="rgba(255,255,255,0.93)", T2="rgba(255,255,255,0.50)", T3="rgba(255,255,255,0.22)";
const GREEN="#3DD6A0", GOLD="#F0B84A", CORAL="#F07B52", BLUE="#5BA8F5", PINK="#F46FAE";
const KEY = "cuatri_v7";
const MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DAYS_S = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

// ── UTILS ─────────────────────────────────────────────────────────────────────
const todayStr = () => new Date().toISOString().split("T")[0];
const timeStr  = () => new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});
const fmtDate  = ds => { const d=new Date(ds+"T12:00:00"); return `${d.getDate()} ${["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"][d.getMonth()]}`; };
const daysUntil= ds => { if(!ds) return null; return Math.ceil((new Date(ds+"T23:59:59")-new Date())/(1000*60*60*24)); };

const mkDefault = () => ({
  topicStatus: Object.fromEntries(SUBJECTS.map(s=>[s.id, Object.fromEntries(s.topics.map((_,i)=>[i,"pendiente"]))])),
  events:[], todos:[],
  notes: Object.fromEntries(SUBJECTS.map(s=>[s.id,""])),
  finals: Object.fromEntries(SUBJECTS.map(s=>[s.id,{date:"",status:"pendiente",nota:""}])),
  resources: Object.fromEntries(SUBJECTS.map(s=>[s.id,[]])),
  feed:[],
});

const calcPct = (data,sid) => { const v=Object.values(data.topicStatus?.[sid]||{}); return v.length?Math.round(v.filter(x=>x==="visto").length/v.length*100):0; };
const calcXP  = data => {
  const topics = SUBJECTS.reduce((a,s)=>a+Object.values(data.topicStatus?.[s.id]||{}).filter(v=>v==="visto").length, 0)*10;
  const todos  = (data.todos||[]).reduce((a,t)=>{ if(!t.done) return a; return a+(t.completionStatus==="completo"?15:t.completionStatus==="parcial"?8:3); },0);
  return topics+todos;
};
const getLevel = xp => xp>=800?{name:"Imparable 🏆",color:GOLD}:xp>=500?{name:"Modo bestia 🔥",color:CORAL}:xp>=300?{name:"Enganchado ⚡",color:GREEN}:xp>=150?{name:"En zona 🎯",color:"#9D8EF5"}:xp>=50?{name:"Tomando ritmo",color:BLUE}:{name:"Arrancando",color:T2};
const calcStreak = feed => {
  if(!feed?.length) return 0;
  const dates=new Set(feed.map(f=>f.date));
  const prev=d=>{const x=new Date(d);x.setDate(x.getDate()-1);return x.toISOString().split("T")[0];};
  let s=0,c=todayStr(); while(dates.has(c)){s++;c=prev(c);}
  if(s===0){c=prev(todayStr());while(dates.has(c)){s++;c=prev(c);}}
  return s;
};

// ── UI ATOMS ──────────────────────────────────────────────────────────────────
const crd = (ex={}) => ({background:CARD, border:`0.5px solid ${BD}`, borderRadius:14, padding:20, ...ex});

function Ring({pct, color, size=88, sw=7, children}){
  const r=(size-sw*2)/2, circ=2*Math.PI*r, off=circ*(1-pct/100);
  return (
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={sw}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw}
          strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
          style={{transition:"stroke-dashoffset 0.8s ease"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{children}</div>
    </div>
  );
}
function PBar({pct, color, h=4}){
  return <div style={{height:h,background:"rgba(255,255,255,0.06)",borderRadius:h,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:h,transition:"width 0.7s"}}/></div>;
}
function Badge({label, color, bg}){ return <span style={{fontSize:11,fontWeight:500,padding:"2px 9px",borderRadius:20,background:bg,color,whiteSpace:"nowrap"}}>{label}</span>; }
function Btn({onClick, children, primary, small, style={}}){
  return <button onClick={onClick} style={{padding:small?"5px 12px":"8px 18px",borderRadius:9,border:`0.5px solid ${primary?BLUE:BD2}`,background:primary?BLUE:"transparent",cursor:"pointer",fontSize:small?12:13,color:primary?"white":T1,...style}}>{children}</button>;
}
const IS = {width:"100%",padding:"9px 12px",borderRadius:9,border:`0.5px solid ${BD2}`,background:CARD2,color:T1,fontSize:13,boxSizing:"border-box"};
function FR({label, children}){ return <div style={{marginBottom:14}}><div style={{fontSize:11,color:T2,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>{children}</div>; }
function Modal({show, onClose, title, children}){
  if(!show) return null;
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:CARD,borderRadius:20,padding:28,width:440,maxWidth:"94vw",border:`0.5px solid ${BD2}`,maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{fontWeight:500,fontSize:16,color:T1,marginBottom:20}}>{title}</div>
        {children}
      </div>
    </div>
  );
}
function DLChip({deadline, done}){
  if(!deadline) return null;
  const d=daysUntil(deadline);
  const color=done?T3:d<0?PINK:d===0?CORAL:d<=3?GOLD:T3;
  const bg=done?"rgba(255,255,255,0.04)":d<0?"rgba(244,111,174,0.12)":d===0?"rgba(240,123,82,0.12)":d<=3?"rgba(240,184,74,0.10)":"rgba(255,255,255,0.05)";
  const label=done?fmtDate(deadline):d<0?`Venció hace ${Math.abs(d)}d`:d===0?"Hoy ⚡":d===1?"Mañana":`${d}d`;
  return <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:bg,color,fontWeight:500,whiteSpace:"nowrap"}}>{label}</span>;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({data, getP, setView, setSub, upEvents, pendingCount}){
  const xp=calcXP(data), lv=getLevel(xp), streak=calcStreak(data.feed||[]);
  const today=todayStr(), todayFeed=(data.feed||[]).filter(f=>f.date===today).slice().reverse();
  const totalDone=SUBJECTS.reduce((a,s)=>a+Object.values(data.topicStatus?.[s.id]||{}).filter(v=>v==="visto").length,0);
  const totalT=SUBJECTS.reduce((a,s)=>a+s.topics.length,0);
  const nextXP=[50,150,300,500,800].find(n=>n>xp)||800;
  const prevXP=xp>=800?500:xp>=500?300:xp>=300?150:xp>=150?50:0;
  const xpPct=Math.min(100,Math.round((xp-prevXP)/(nextXP-prevXP)*100));
  const todos=data.todos||[];
  const overdueCount=todos.filter(t=>!t.done&&t.deadline&&daysUntil(t.deadline)<0).length;
  const dueSoon=todos.filter(t=>!t.done&&t.deadline&&daysUntil(t.deadline)>=0&&daysUntil(t.deadline)<=3);
  const completedTodos=todos.filter(t=>t.done).length;
  const totalTodos=todos.length;
  const successRate=completedTodos>0?Math.round(todos.filter(t=>t.completionStatus==="completo").length/completedTodos*100):0;

  return (
    <div>
      {/* Alerts */}
      {(overdueCount>0||dueSoon.length>0)&&(
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
          {overdueCount>0&&<div style={{background:"rgba(244,111,174,0.08)",border:`0.5px solid ${PINK}40`,borderRadius:12,padding:"11px 16px",display:"flex",alignItems:"center",gap:10}}>
            <span>⚠️</span>
            <span style={{fontSize:12,color:PINK}}>{overdueCount} objetivo{overdueCount>1?"s":""} vencido{overdueCount>1?"s":""}</span>
            <span onClick={()=>setView("objetivos")} style={{marginLeft:"auto",fontSize:11,color:PINK,cursor:"pointer"}}>Ver →</span>
          </div>}
          {dueSoon.length>0&&<div style={{background:"rgba(240,123,82,0.08)",border:`0.5px solid ${CORAL}40`,borderRadius:12,padding:"11px 16px",display:"flex",alignItems:"center",gap:10}}>
            <span>⏰</span>
            <span style={{fontSize:12,color:CORAL}}>Vencen pronto: {dueSoon.map(t=>t.text).join(" · ")}</span>
          </div>}
        </div>
      )}

      {/* XP bar */}
      <div style={{...crd({padding:"13px 20px",marginBottom:16,display:"flex",alignItems:"center",gap:16})}}>
        <div style={{flex:1}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
            <span style={{fontSize:13,fontWeight:500,color:lv.color}}>{lv.name}</span>
            <span style={{fontSize:12,color:T2}}>{xp} XP</span>
          </div>
          <PBar pct={xpPct} color={lv.color} h={5}/>
        </div>
      </div>

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:12,marginBottom:20}}>
        {[
          {icon:"🔥",label:"Racha",          val:`${streak} días`,        color:streak>0?GOLD:T3},
          {icon:"📚",label:"Temas vistos",   val:`${totalDone}/${totalT}`, color:T1},
          {icon:"🎯",label:"Tasa de éxito",  val:`${successRate}%`,        color:successRate>=70?GREEN:successRate>0?GOLD:T3},
          {icon:"📝",label:"Obj. pendientes",val:pendingCount,              color:overdueCount>0?PINK:T1},
        ].map((s,i)=>(
          <div key={i} style={{background:CARD2,border:`0.5px solid ${BD}`,borderRadius:12,padding:16}}>
            <div style={{fontSize:18,marginBottom:6}}>{s.icon}</div>
            <div style={{fontSize:10,color:T2,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>{s.label}</div>
            <div style={{fontSize:22,fontWeight:500,color:s.color}}>{s.val}</div>
          </div>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 285px",gap:16}}>
        <div>
          {/* Cursando */}
          <div style={{fontSize:11,color:T3,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:12}}>Cursando</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:16}}>
            {SUBJECTS.filter(s=>!s.finalOnly).map(s=>{
              const pct=getP(s.id), v=Object.values(data.topicStatus?.[s.id]||{}).filter(v=>v==="visto").length;
              return (
                <div key={s.id} onClick={()=>{setSub(s.id);setView("materias");}} style={{background:CARD2,border:`0.5px solid ${BD}`,borderRadius:14,padding:"16px 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:10,transition:"border-color 0.2s"}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=s.color+"70"}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=BD}>
                  <Ring pct={pct} color={s.color} size={70} sw={6}><span style={{fontSize:12,fontWeight:500,color:T1}}>{pct}%</span></Ring>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:11,fontWeight:500,color:s.color}}>{s.short}</div>
                    <div style={{fontSize:10,color:T3,marginTop:2}}>{v}/{s.topics.length}</div>
                  </div>
                </div>
              );
            })}
          </div>
          {/* Solo final */}
          <div style={{fontSize:11,color:T3,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:12}}>Solo final</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {SUBJECTS.filter(s=>s.finalOnly).map(s=>{
              const pct=getP(s.id), v=Object.values(data.topicStatus?.[s.id]||{}).filter(v=>v==="visto").length;
              return (
                <div key={s.id} onClick={()=>{setSub(s.id);setView("materias");}} style={{background:CARD2,border:`0.5px dashed ${s.color}50`,borderRadius:14,padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,transition:"border-color 0.2s"}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=s.color+"90"}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=s.color+"50"}>
                  <Ring pct={pct} color={s.color} size={56} sw={5}><span style={{fontSize:10,fontWeight:500,color:T1}}>{pct}%</span></Ring>
                  <div>
                    <div style={{fontSize:11,fontWeight:500,color:s.color}}>{s.short} <span style={{fontSize:9,color:T3}}>final</span></div>
                    <div style={{fontSize:12,color:T2,marginTop:2}}>{s.name}</div>
                    <div style={{fontSize:10,color:T3,marginTop:3}}>{v}/{s.topics.length} vistos</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Right col */}
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={crd({flex:1})}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <span style={{fontSize:11,color:T2,textTransform:"uppercase",letterSpacing:"0.07em"}}>Actividad hoy</span>
              {todayFeed.length>0&&<span style={{fontSize:11,color:GREEN,fontWeight:500}}>{todayFeed.length} ✓</span>}
            </div>
            {todayFeed.length===0?(
              <div style={{textAlign:"center",padding:"16px 0"}}>
                <div style={{fontSize:28,marginBottom:8}}>📖</div>
                <div style={{fontSize:12,color:T3}}>Todavía no marcaste nada hoy.</div>
                <div style={{fontSize:11,color:T3,marginTop:4}}>¡Hoy es buen día para estudiar!</div>
              </div>
            ):todayFeed.slice(0,6).map(item=>{
              const s=SUBJECTS.find(sub=>sub.id===item.subjectId);
              return (
                <div key={item.id} className="slide" style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:10}}>
                  <div style={{width:7,height:7,borderRadius:"50%",background:s?.color,flexShrink:0,marginTop:4}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,color:T1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.text}</div>
                    <div style={{fontSize:10,color:T3}}>{s?.short} · {item.time} · +{item.xp} XP</div>
                  </div>
                </div>
              );
            })}
          </div>
          <div style={crd()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontSize:11,color:T2,textTransform:"uppercase",letterSpacing:"0.07em"}}>Próximos</span>
              <span onClick={()=>setView("calendario")} style={{fontSize:11,color:BLUE,cursor:"pointer"}}>ver todos →</span>
            </div>
            {upEvents.length===0?<div style={{fontSize:12,color:T3,cursor:"pointer"}} onClick={()=>setView("calendario")}>Sin eventos. Agregar →</div>
              :upEvents.slice(0,3).map(ev=>{
                const s=SUBJECTS.find(sub=>sub.id===ev.subjectId);
                return (
                  <div key={ev.id} style={{display:"flex",gap:10,marginBottom:10}}>
                    <div style={{fontSize:11,background:s?.glow,color:s?.color,borderRadius:5,padding:"2px 7px",whiteSpace:"nowrap",fontWeight:500}}>{ev.date.slice(5).replace("-","/")}</div>
                    <div><div style={{fontSize:12,color:T1}}>{ev.description}</div><div style={{fontSize:10,color:T3}}>{ev.type} · {s?.short}</div></div>
                  </div>
                );
              })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── MATERIAS ──────────────────────────────────────────────────────────────────
function Materias({data, selSub, setSub, updTopic, updNote, getP, updRes}){
  const [popped,setPopped]=useState(new Set());
  const [tab,setTab]=useState("temas");
  const sub=SUBJECTS.find(s=>s.id===selSub);
  const pct=getP(selSub), sts=data.topicStatus?.[selSub]||{};
  const visto=Object.values(sts).filter(v=>v==="visto").length;

  const cycle=idx=>{
    const order=["pendiente","en curso","visto"], cur=sts[idx]||"pendiente";
    const next=order[(order.indexOf(cur)+1)%order.length];
    updTopic(selSub,idx,next);
    if(next==="visto"){const k=`${selSub}-${idx}`;setPopped(p=>new Set([...p,k]));setTimeout(()=>setPopped(p=>{const n=new Set(p);n.delete(k);return n;}),700);}
  };
  const stS={
    pendiente: {color:T3,  bg:"rgba(255,255,255,0.05)", label:"Pendiente"},
    "en curso":{color:GOLD,bg:"rgba(240,184,74,0.12)",  label:"En curso"},
    visto:     {color:GREEN,bg:"rgba(61,214,160,0.12)", label:"Visto ✓"},
  };

  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:11,color:T3}}>Cursando:</span>
        {SUBJECTS.filter(s=>!s.finalOnly).map(s=>(
          <button key={s.id} onClick={()=>{setSub(s.id);setTab("temas");}} style={{padding:"5px 12px",borderRadius:20,cursor:"pointer",border:selSub===s.id?`1.5px solid ${s.color}`:`0.5px solid ${BD}`,background:selSub===s.id?s.glow:"transparent",color:selSub===s.id?s.color:T2,fontSize:12,fontWeight:selSub===s.id?500:400}}>{s.short}</button>
        ))}
        <span style={{fontSize:11,color:T3,marginLeft:8}}>Solo final:</span>
        {SUBJECTS.filter(s=>s.finalOnly).map(s=>(
          <button key={s.id} onClick={()=>{setSub(s.id);setTab("temas");}} style={{padding:"5px 12px",borderRadius:20,cursor:"pointer",border:selSub===s.id?`1.5px dashed ${s.color}`:`0.5px dashed ${BD}`,background:selSub===s.id?s.glow:"transparent",color:selSub===s.id?s.color:T2,fontSize:12}}>{s.short}</button>
        ))}
      </div>

      {sub&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 250px",gap:16,marginTop:14}}>
          <div>
            <div style={{...crd({padding:24,marginBottom:12,display:"flex",gap:24,alignItems:"center"})}}>
              <Ring pct={pct} color={sub.color} size={104} sw={9}>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:500,color:T1}}>{pct}%</div>
                  <div style={{fontSize:10,color:T3}}>{visto}/{sub.topics.length}</div>
                </div>
              </Ring>
              <div style={{flex:1}}>
                <div style={{fontSize:17,fontWeight:500,color:T1,marginBottom:4}}>{sub.name}</div>
                {sub.finalOnly&&<div style={{fontSize:11,color:sub.color,marginBottom:6}}>Preparación para final</div>}
                <div style={{fontSize:12,color:T2,marginBottom:10}}>{visto} de {sub.topics.length} temas completados</div>
                <PBar pct={pct} color={sub.color} h={4}/>
                <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
                  {Object.entries(stS).map(([k,inf])=><div key={k} style={{fontSize:11,color:inf.color,background:inf.bg,padding:"2px 10px",borderRadius:20}}>{inf.label}: {Object.values(sts).filter(v=>v===k).length}</div>)}
                </div>
              </div>
            </div>

            {/* Tabs */}
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              {[["temas","📋 Temas"],["recursos","🔗 Recursos"]].map(([t,lb])=>(
                <button key={t} onClick={()=>setTab(t)} style={{padding:"7px 16px",borderRadius:9,cursor:"pointer",border:tab===t?`1.5px solid ${sub.color}`:`0.5px solid ${BD}`,background:tab===t?sub.glow:"transparent",color:tab===t?sub.color:T2,fontSize:13,fontWeight:tab===t?500:400}}>{lb}</button>
              ))}
            </div>

            {tab==="temas"&&(
              <div style={crd({padding:"8px 20px"})}>
                {sub.topics.map((topic,i)=>{
                  const status=sts[i]||"pendiente", st=stS[status], pk=`${selSub}-${i}`, pop=popped.has(pk);
                  return (
                    <div key={i} style={{display:"flex",alignItems:"center",gap:14,padding:"11px 0",borderBottom:`0.5px solid ${BD}`}}>
                      <div onClick={()=>cycle(i)} className={pop?"pop":""} style={{flexShrink:0,width:22,height:22,borderRadius:"50%",cursor:"pointer",background:status==="visto"?sub.color:status==="en curso"?"rgba(240,184,74,0.2)":"transparent",border:status==="visto"?`2px solid ${sub.color}`:status==="en curso"?`2px solid ${GOLD}`:`1.5px solid ${BD2}`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:pop?`0 0 14px ${sub.color}`:"none",transition:"box-shadow 0.3s"}}>
                        {status==="visto"&&<span style={{color:"white",fontSize:11}}>✓</span>}
                        {status==="en curso"&&<div style={{width:8,height:8,borderRadius:"50%",background:GOLD}}/>}
                      </div>
                      <div style={{flex:1,fontSize:13,color:status==="visto"?T3:T1,textDecoration:status==="visto"?"line-through":"none",transition:"all 0.3s"}}>{topic}</div>
                      <button onClick={()=>cycle(i)} style={{fontSize:11,padding:"3px 10px",borderRadius:20,border:"none",cursor:"pointer",background:st.bg,color:st.color,fontWeight:500}}>{st.label}</button>
                    </div>
                  );
                })}
              </div>
            )}

            {tab==="recursos"&&<RecursosPanel resources={data.resources?.[selSub]||[]} sid={selSub} color={sub.color} glow={sub.glow} updRes={updRes}/>}
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={crd()}>
              <div style={{fontSize:11,color:T2,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Avance</div>
              {[["Visto",GREEN,"visto"],["En curso",GOLD,"en curso"],["Pendiente",T3,"pendiente"]].map(([lb,color,k])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:6,height:6,borderRadius:"50%",background:color}}/><span style={{fontSize:12,color:T2}}>{lb}</span></div>
                  <span style={{fontSize:13,fontWeight:500,color}}>{Object.values(sts).filter(v=>v===k).length}</span>
                </div>
              ))}
            </div>
            <div style={crd()}>
              <div style={{fontSize:11,color:T2,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>Notas rápidas</div>
              <textarea value={data.notes?.[selSub]||""} onChange={e=>updNote(selSub,e.target.value)}
                placeholder="Fórmulas clave, dudas, conceptos importantes..."
                style={{width:"100%",minHeight:200,fontSize:12,padding:12,borderRadius:10,border:`0.5px solid ${BD}`,background:CARD2,color:T1,resize:"vertical",lineHeight:1.7,boxSizing:"border-box"}}/>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── RECURSOS PANEL ────────────────────────────────────────────────────────────

  const del=id=>updRes(sid,"del",id);

    <div>

        <Btn onClick={()=>setShowAdd(true)} small>+ Agregar</Btn>

          <div style={{fontSize:12,color:T3}}>Agregá links a PDFs, apuntes, GoodNotes, videos</div>

        </div>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {resources.map(res=>{
            const rt=RES_TYPES[res.type]||RES_TYPES.link;
            return (
              <div key={res.id} style={{background:CARD2,border:`0.5px solid ${BD}`,borderRadius:12,padding:14,display:"flex",gap:12,alignItems:"flex-start",transition:"border-color 0.2s"}}
                onMouseEnter={e=>e.currentTarget.style.borderColor=color+"60"}
                onMouseLeave={e=>e.currentTarget.style.borderColor=BD}>
                <div style={{width:36,height:36,borderRadius:9,background:glow,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{rt.icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  <a href={res.url} target="_blank" rel="noopener noreferrer" style={{fontSize:13,fontWeight:500,color:T1,display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",cursor:"pointer"}}>{res.name}</a>
                  <div style={{display:"flex",gap:6,alignItems:"center",marginTop:4}}>
                    <span style={{fontSize:10,padding:"1px 7px",borderRadius:20,background:glow,color}}>{rt.label}</span>
                    {res.desc&&<span style={{fontSize:11,color:T3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{res.desc}</span>}
                  </div>

            );

      )}
      <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="Agregar recurso">
        <FR label="Nombre"><input type="text" value={nRes.name} onChange={e=>setNRes(n=>({...n,name:e.target.value}))} placeholder="ej: Apunte transformadores" style={IS}/></FR>
        <FR label="URL / Link">
          <input type="url" value={nRes.url} onChange={e=>setNRes(n=>({...n,url:e.target.value}))} placeholder="https://..." style={IS}/>
          <div style={{fontSize:11,color:T3,marginTop:5}}>Pegá el link del PDF, GoodNotes, Drive, YouTube, etc.</div>
        </FR>
        <FR label="Tipo"><select value={nRes.type} onChange={e=>setNRes(n=>({...n,type:e.target.value}))} style={IS}>{Object.entries(RES_TYPES).map(([k,v])=><option key={k} value={k}>{v.icon} {v.label}</option>)}</select></FR>
        <FR label="Descripción (opcional)"><input type="text" value={nRes.desc} onChange={e=>setNRes(n=>({...n,desc:e.target.value}))} placeholder="ej: Capítulos 1-3" style={IS} onKeyDown={e=>e.key==="Enter"&&add()}/></FR>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>

      </Modal>
    </div>
  );
}

// ── OBJETIVOS ─────────────────────────────────────────────────────────────────
function Objetivos({data, addTodo, completeTodo, undoTodo, deleteTodo}){
  const [showAdd,setShowAdd]=useState(false);
  const [nTodo,setNTodo]=useState({subjectId:SUBJECTS[0].id,text:"",priority:"media",deadline:""});
  const [fSub,setFSub]=useState("todos");
  const [fSt,setFSt]=useState("pendientes");
  const [sortBy,setSortBy]=useState("deadline");
  const [completing,setCompleting]=useState(null);
  const [compStatus,setCompStatus]=useState("completo");
  const [compScore,setCompScore]=useState(5);

  const todos=data.todos||[];
  const overdue=todos.filter(t=>!t.done&&t.deadline&&daysUntil(t.deadline)<0).length;
  const filtered=todos
    .filter(t=>fSub==="todos"||t.subjectId===fSub)
    .filter(t=>fSt==="todos"||(fSt==="pendientes"?!t.done:t.done))
    .sort((a,b)=>{
      if(sortBy==="deadline"){if(!a.deadline&&!b.deadline)return 0;if(!a.deadline)return 1;if(!b.deadline)return -1;return a.deadline.localeCompare(b.deadline);}
      return ({alta:0,media:1,baja:2})[a.priority]-({alta:0,media:1,baja:2})[b.priority];
    });

  const doAdd=()=>{if(!nTodo.text)return;addTodo({...nTodo,id:Date.now().toString(),done:false,completionStatus:null,score:null,completedAt:null});setShowAdd(false);setNTodo({subjectId:SUBJECTS[0].id,text:"",priority:"media",deadline:""});};
  const doComplete=()=>{if(!completing)return;completeTodo(completing.id,compStatus,compScore);setCompleting(null);};

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div><h2 style={{color:T1,fontWeight:500,fontSize:18,margin:0}}>Objetivos</h2><p style={{color:T2,fontSize:13,margin:"4px 0 0"}}>Con deadline y seguimiento de cumplimiento</p></div>
        <Btn onClick={()=>setShowAdd(true)}>+ Nuevo objetivo</Btn>
      </div>

      {overdue>0&&<div style={{background:"rgba(244,111,174,0.08)",border:`0.5px solid ${PINK}40`,borderRadius:10,padding:"10px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
        <span>⚠️</span><span style={{fontSize:12,color:PINK}}>{overdue} objetivo{overdue>1?"s":""} vencido{overdue>1?"s":""}</span>
      </div>}

      <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
        {[{id:"todos",name:"Todas"},...SUBJECTS.map(s=>({id:s.id,name:s.short}))].map(o=>{
          const s=SUBJECTS.find(sub=>sub.id===o.id);
          return <button key={o.id} onClick={()=>setFSub(o.id)} style={{padding:"5px 11px",borderRadius:20,cursor:"pointer",border:fSub===o.id?`1.5px solid ${s?.color||BLUE}`:`0.5px solid ${BD}`,background:fSub===o.id?s?.glow||`${BLUE}18`:"transparent",color:fSub===o.id?s?.color||BLUE:T2,fontSize:12}}>{o.name}</button>;
        })}
        <div style={{marginLeft:"auto",display:"flex",gap:5}}>
          {[["deadline","Deadline"],["priority","Prioridad"]].map(([v,lb])=><button key={v} onClick={()=>setSortBy(v)} style={{padding:"4px 10px",borderRadius:20,cursor:"pointer",border:sortBy===v?`1.5px solid ${BLUE}`:`0.5px solid ${BD}`,background:sortBy===v?`${BLUE}15`:"transparent",color:sortBy===v?BLUE:T2,fontSize:11}}>{lb}</button>)}
        </div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:14,alignItems:"center"}}>
        {[["pendientes","Pendientes"],["completadas","Completados"],["todos","Todos"]].map(([st,lb])=><button key={st} onClick={()=>setFSt(st)} style={{padding:"5px 12px",borderRadius:20,cursor:"pointer",border:fSt===st?`1.5px solid ${BD2}`:`0.5px solid ${BD}`,background:fSt===st?CARD2:"transparent",color:T2,fontSize:12}}>{lb}</button>)}
        <span style={{marginLeft:"auto",fontSize:11,color:T3}}>{todos.filter(t=>t.done).length}/{todos.length} completados</span>
      </div>

      <div style={crd({padding:"4px 20px"})}>
        {filtered.length===0
          ?<div style={{padding:"24px 0",textAlign:"center",color:T3,fontSize:13}}>Sin objetivos. <span style={{color:BLUE,cursor:"pointer"}} onClick={()=>setShowAdd(true)}>Crear →</span></div>
          :filtered.map(todo=>{
            const s=SUBJECTS.find(sub=>sub.id===todo.subjectId), p=PRIO[todo.priority], cs_=COMP_ST[todo.completionStatus];
            const isOverdue=!todo.done&&todo.deadline&&daysUntil(todo.deadline)<0;
            return (
              <div key={todo.id} style={{display:"flex",gap:12,alignItems:"flex-start",padding:"14px 0",borderBottom:`0.5px solid ${BD}`,borderLeft:`3px solid ${isOverdue?PINK+"60":todo.done&&cs_?cs_.color+"30":"transparent"}`,paddingLeft:14,marginLeft:-14}}>
                <button onClick={()=>todo.done?undoTodo(todo.id):setCompleting(todo)} style={{width:24,height:24,borderRadius:"50%",cursor:"pointer",flexShrink:0,marginTop:1,border:`1.5px solid ${todo.done?cs_?.color||GREEN:isOverdue?PINK:BD2}`,background:todo.done?cs_?.color||GREEN:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>
                  {todo.done&&<span style={{color:"white",fontSize:12}}>{cs_?.icon||"✓"}</span>}
                </button>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,color:todo.done?T3:T1,textDecoration:todo.done?"line-through":"none",marginBottom:5}}>{todo.text}</div>
                  <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
                    <span style={{fontSize:10,color:s?.color,fontWeight:500}}>{s?.short}</span>
                    <span style={{fontSize:10,padding:"1px 7px",borderRadius:20,background:p.bg,color:p.color}}>{p.label}</span>
                    <DLChip deadline={todo.deadline} done={todo.done}/>
                    {todo.done&&cs_&&<Badge label={cs_.label} color={cs_.color} bg={cs_.bg}/>}
                    {todo.done&&todo.score&&<span style={{fontSize:12,color:cs_?.color||GREEN}}>{Array.from({length:todo.score}).map((_,i)=><span key={i}>★</span>)}</span>}
                  </div>
                  {todo.done&&todo.completedAt&&<div style={{fontSize:10,color:T3,marginTop:4}}>Completado el {fmtDate(todo.completedAt)}</div>}
                </div>
                <button onClick={()=>deleteTodo(todo.id)} style={{border:"none",background:"transparent",cursor:"pointer",color:T3,fontSize:18,flexShrink:0,marginTop:2}}>×</button>
              </div>
            );
          })}
      </div>

      {/* Add modal */}
      <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="Nuevo objetivo">
        <FR label="Materia"><select value={nTodo.subjectId} onChange={e=>setNTodo(n=>({...n,subjectId:e.target.value}))} style={IS}>{SUBJECTS.map(s=><option key={s.id} value={s.id}>{s.name}{s.finalOnly?" (final)":""}</option>)}</select></FR>
        <FR label="Objetivo"><input type="text" value={nTodo.text} onChange={e=>setNTodo(n=>({...n,text:e.target.value}))} placeholder="ej: Resolver guía de Simplex, repasar Bernoulli..." style={IS} onKeyDown={e=>e.key==="Enter"&&doAdd()}/></FR>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <FR label="Prioridad"><select value={nTodo.priority} onChange={e=>setNTodo(n=>({...n,priority:e.target.value}))} style={IS}><option value="alta">🔴 Alta</option><option value="media">🟡 Media</option><option value="baja">🟢 Baja</option></select></FR>
          <FR label="Deadline"><input type="date" value={nTodo.deadline} onChange={e=>setNTodo(n=>({...n,deadline:e.target.value}))} style={IS}/></FR>
        </div>
        <div style={{fontSize:11,color:T3,marginTop:-8,marginBottom:14}}>El deadline activa alertas automáticas cuando se acerque.</div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <Btn onClick={()=>setShowAdd(false)}>Cancelar</Btn>
          <Btn onClick={doAdd} primary>Crear objetivo</Btn>
        </div>
      </Modal>

      {/* Complete modal */}
      <Modal show={!!completing} onClose={()=>setCompleting(null)} title="¿Cómo te fue?">
        {completing&&(
          <div>
            <div style={{fontSize:13,color:T2,marginBottom:16,padding:"10px 14px",background:CARD2,borderRadius:9,borderLeft:`3px solid ${SUBJECTS.find(s=>s.id===completing.subjectId)?.color||BLUE}`}}>{completing.text}</div>
            <FR label="Resultado">
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                {Object.entries(COMP_ST).map(([k,v])=>(
                  <button key={k} onClick={()=>setCompStatus(k)} style={{padding:"12px 8px",borderRadius:10,cursor:"pointer",border:compStatus===k?`2px solid ${v.color}`:`0.5px solid ${BD}`,background:compStatus===k?v.bg:"transparent",color:compStatus===k?v.color:T2,fontSize:13,fontWeight:compStatus===k?500:400,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                    <span style={{fontSize:20}}>{v.icon}</span>
                    <span>{v.label}</span>
                  </button>
                ))}
              </div>
            </FR>
            <FR label={`Puntaje: ${compScore}/5`}>
              <div style={{display:"flex",gap:6,marginTop:4}}>
                {[1,2,3,4,5].map(i=>(
                  <button key={i} onClick={()=>setCompScore(i)} style={{flex:1,padding:"10px 0",borderRadius:8,border:`0.5px solid ${i<=compScore?COMP_ST[compStatus].color:BD}`,background:i<=compScore?COMP_ST[compStatus].bg:"transparent",cursor:"pointer",fontSize:18,color:i<=compScore?COMP_ST[compStatus].color:T3}}>★</button>
                ))}
              </div>
            </FR>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:4}}>
              <Btn onClick={()=>setCompleting(null)}>Cancelar</Btn>
              <Btn onClick={doComplete} primary>Guardar resultado</Btn>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
}

// ── CALENDARIO ────────────────────────────────────────────────────────────────
function Calendario({data, month, year, setMonth, setYear, addEvent, deleteEvent}){
  const [showAdd,setShowAdd]=useState(false);
  const [nEv,setNEv]=useState({date:"",subjectId:SUBJECTS[0].id,type:"parcial",description:""});
  const first=new Date(year,month,1).getDay(), dim=new Date(year,month+1,0).getDate();
  const cells=[...Array(first).fill(null),...Array.from({length:dim},(_,i)=>i+1)];
  while(cells.length%7!==0) cells.push(null);
  const evOn=day=>{if(!day)return[];const ds=`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;return(data.events||[]).filter(e=>e.date===ds);};
  const today=new Date();
  const doAdd=()=>{if(!nEv.date||!nEv.description)return;addEvent({...nEv,id:Date.now().toString()});setShowAdd(false);setNEv({date:"",subjectId:SUBJECTS[0].id,type:"parcial",description:""});};

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{color:T1,fontWeight:500,fontSize:18,margin:0}}>Calendario</h2>
        <Btn onClick={()=>setShowAdd(true)}>+ Agregar evento</Btn>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 250px",gap:16}}>
        <div style={crd({padding:24})}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
            <button onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}} style={{border:"none",background:"transparent",cursor:"pointer",fontSize:22,color:T2,padding:"4px 10px"}}>‹</button>
            <span style={{fontWeight:500,fontSize:15,color:T1}}>{MONTHS[month]} {year}</span>
            <button onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}} style={{border:"none",background:"transparent",cursor:"pointer",fontSize:22,color:T2,padding:"4px 10px"}}>›</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
            {DAYS_S.map(d=><div key={d} style={{textAlign:"center",fontSize:10,color:T3,fontWeight:500,padding:"4px 0",textTransform:"uppercase"}}>{d}</div>)}
            {cells.map((day,i)=>{
              const evs=evOn(day), isToday=day&&today.getDate()===day&&today.getMonth()===month&&today.getFullYear()===year;
              return (
                <div key={i} style={{minHeight:56,padding:3,borderRadius:8,background:isToday?`${BLUE}18`:"transparent",border:`0.5px solid ${isToday?BLUE:"transparent"}`}}>
                  {day&&<>
                    <div style={{fontSize:12,color:isToday?BLUE:T2,fontWeight:isToday?500:400,textAlign:"center",marginBottom:2}}>{day}</div>
                    {evs.map(ev=>{const s=SUBJECTS.find(sub=>sub.id===ev.subjectId);return<div key={ev.id} style={{fontSize:9,background:s?.glow,color:s?.color,borderRadius:4,padding:"1px 4px",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.type==="final"?"F":"P"} {ev.description}</div>;})}
                  </>}
                </div>
              );
            })}
          </div>
        </div>
        <div style={crd()}>
          <div style={{fontSize:11,color:T2,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:14}}>Eventos</div>
          {(data.events||[]).length===0?<div style={{fontSize:12,color:T3}}>Sin eventos cargados.</div>
            :[...(data.events||[])].sort((a,b)=>a.date.localeCompare(b.date)).map(ev=>{
              const s=SUBJECTS.find(sub=>sub.id===ev.subjectId);
              return (
                <div key={ev.id} style={{display:"flex",gap:8,marginBottom:12,paddingBottom:12,borderBottom:`0.5px solid ${BD}`}}>
                  <div style={{background:s?.glow,color:s?.color,borderRadius:6,padding:"3px 7px",fontSize:11,fontWeight:500,whiteSpace:"nowrap"}}>{ev.date.slice(5).replace("-","/")}</div>
                  <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,color:T1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.description}</div><div style={{fontSize:10,color:T3}}>{ev.type} · {s?.short}</div></div>
                  <button onClick={()=>deleteEvent(ev.id)} style={{border:"none",background:"transparent",cursor:"pointer",color:T3,fontSize:16}}>×</button>
                </div>
              );
            })}
        </div>
      </div>
      <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="Nuevo evento">
        <FR label="Materia"><select value={nEv.subjectId} onChange={e=>setNEv(n=>({...n,subjectId:e.target.value}))} style={IS}>{SUBJECTS.map(s=><option key={s.id} value={s.id}>{s.name}{s.finalOnly?" (final)":""}</option>)}</select></FR>
        <FR label="Tipo"><select value={nEv.type} onChange={e=>setNEv(n=>({...n,type:e.target.value}))} style={IS}><option value="parcial">Parcial</option><option value="final">Final</option><option value="entrega">Entrega / TP</option><option value="otro">Otro</option></select></FR>
        <FR label="Fecha"><input type="date" value={nEv.date} onChange={e=>setNEv(n=>({...n,date:e.target.value}))} style={IS}/></FR>
        <FR label="Descripción"><input type="text" value={nEv.description} onChange={e=>setNEv(n=>({...n,description:e.target.value}))} placeholder="ej: Parcial 1 — Transformadores" style={IS} onKeyDown={e=>e.key==="Enter"&&doAdd()}/></FR>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <Btn onClick={()=>setShowAdd(false)}>Cancelar</Btn>
          <Btn onClick={doAdd} primary>Guardar</Btn>
        </div>
      </Modal>
    </div>
  );
}

// ── FINALES ───────────────────────────────────────────────────────────────────
function Finales({data, updFinal, getP}){
  return (
    <div>
      <h2 style={{color:T1,fontWeight:500,fontSize:18,marginBottom:6}}>Finales</h2>
      <p style={{color:T2,fontSize:13,marginBottom:20}}>7 materias — 5 cursadas + 2 solo finales</p>
      {[{title:"Cursadas este cuatrimestre",list:SUBJECTS.filter(s=>!s.finalOnly)},{title:"Solo final — preparación libre",list:SUBJECTS.filter(s=>s.finalOnly)}].map(g=>(
        <div key={g.title} style={{marginBottom:22}}>
          <div style={{fontSize:11,color:T3,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:12}}>{g.title}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {g.list.map(s=>{
              const fin=data.finals?.[s.id]||{date:"",status:"pendiente",nota:""}, pct=getP(s.id), st=FINAL_ST[fin.status]||FINAL_ST.pendiente;
              return (
                <div key={s.id} style={crd({border:s.finalOnly?`0.5px dashed ${s.color}50`:undefined})}>
                  <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:14}}>
                    <Ring pct={pct} color={s.color} size={54} sw={5}><span style={{fontSize:10,fontWeight:500,color:T1}}>{pct}%</span></Ring>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:14,fontWeight:500,color:T1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</div>
                      <div style={{fontSize:10,color:s.color,marginTop:2}}>{s.short}{s.finalOnly?" · solo final":""}</div>
                    </div>
                    <Badge label={st.label} color={st.color} bg={st.bg}/>
                  </div>
                  <PBar pct={pct} color={s.color} h={3}/>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 70px",gap:8,marginTop:14}}>
                    <div><div style={{fontSize:10,color:T3,marginBottom:5}}>Estado</div><select value={fin.status} onChange={e=>updFinal(s.id,"status",e.target.value)} style={{...IS,fontSize:11,padding:"6px 8px"}}>{Object.entries(FINAL_ST).map(([v,i])=><option key={v} value={v}>{i.label}</option>)}</select></div>
                    <div><div style={{fontSize:10,color:T3,marginBottom:5}}>Fecha</div><input type="date" value={fin.date} onChange={e=>updFinal(s.id,"date",e.target.value)} style={{...IS,fontSize:11,padding:"6px 8px"}}/></div>
                    <div><div style={{fontSize:10,color:T3,marginBottom:5}}>Nota</div><input type="text" value={fin.nota} onChange={e=>updFinal(s.id,"nota",e.target.value)} placeholder="—" style={{...IS,fontSize:13,padding:"6px 8px",textAlign:"center",fontWeight:500}}/></div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}
      <div style={crd()}>
        <div style={{fontSize:11,color:T2,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:12}}>Resumen</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
          {Object.entries(FINAL_ST).map(([status,info])=>{
            const count=SUBJECTS.filter(s=>(data.finals?.[s.id]?.status||"pendiente")===status).length;
            return <div key={status} style={{textAlign:"center",padding:14,background:info.bg,borderRadius:10}}><div style={{fontSize:26,fontWeight:500,color:info.color}}>{count}</div><div style={{fontSize:10,color:info.color,marginTop:2}}>{info.label}</div></div>;
          })}
        </div>
      </div>
    </div>
  );
}

// ── PANEL STATS ───────────────────────────────────────────────────────────────
function PanelStats({data, getP}){
  const todos=data.todos||[], feed=data.feed||[];
  const done=todos.filter(t=>t.done), pending=todos.filter(t=>!t.done);
  const completos=done.filter(t=>t.completionStatus==="completo").length;
  const parciales=done.filter(t=>t.completionStatus==="parcial").length;
  const incompletos=done.filter(t=>t.completionStatus==="incompleto").length;
  const overdue=pending.filter(t=>t.deadline&&daysUntil(t.deadline)<0).length;
  const successRate=done.length>0?Math.round(completos/done.length*100):0;
  const avgScore=done.filter(t=>t.score).length>0?(done.filter(t=>t.score).reduce((a,t)=>a+t.score,0)/done.filter(t=>t.score).length).toFixed(1):"-";
  const today=todayStr(), streak=calcStreak(feed), xp=calcXP(data), lv=getLevel(xp);

  // Daily bars last 14 days
  const last14=Array.from({length:14},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(13-i));const ds=d.toISOString().split("T")[0];
    const dayDone=todos.filter(t=>t.done&&t.completedAt===ds);
    const topicDone=feed.filter(f=>f.date===ds&&f.type==="topic").length;
    return{date:ds,label:DAYS_S[d.getDay()],objs:dayDone.length,topics:topicDone,isToday:ds===today,
      completos:dayDone.filter(t=>t.completionStatus==="completo").length,
      parciales:dayDone.filter(t=>t.completionStatus==="parcial").length};
  });
  const maxDay=Math.max(...last14.map(d=>d.objs+d.topics),1);

  // Heatmap 70 days
  const heatMap={};
  todos.filter(t=>t.done&&t.completedAt).forEach(t=>{heatMap[t.completedAt]=(heatMap[t.completedAt]||0)+1;});
  feed.filter(f=>f.type==="topic").forEach(f=>{heatMap[f.date]=(heatMap[f.date]||0)+1;});
  const hDays=[];for(let i=69;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const s=d.toISOString().split("T")[0];hDays.push({date:s,n:heatMap[s]||0});}
  const hWeeks=[];for(let i=0;i<hDays.length;i+=7)hWeeks.push(hDays.slice(i,i+7));
  const hC=n=>!n?"#1A1D2C":n<2?"#193D2E":n<4?"#1E6B4A":n<6?"#27925F":"#3DD6A0";

  // Radar
  const cx=120,cy=100,r=78,n=SUBJECTS.length;
  const rPts=SUBJECTS.map((s,i)=>{const a=(2*Math.PI*i/n)-Math.PI/2,p=getP(s.id)/100;return{x:cx+r*p*Math.cos(a),y:cy+r*p*Math.sin(a),gx:cx+r*Math.cos(a),gy:cy+r*Math.sin(a),s};});
  const gPts=f=>SUBJECTS.map((_,i)=>{const a=(2*Math.PI*i/n)-Math.PI/2;return`${cx+r*f*Math.cos(a)},${cy+r*f*Math.sin(a)}`;}).join(" ");
  const poly=rPts.map(p=>`${p.x},${p.y}`).join(" ");

  // Per-subject
  const bySub=SUBJECTS.map(s=>{
    const st=todos.filter(t=>t.subjectId===s.id), sd=st.filter(t=>t.done);
    return{...s,total:st.length,done:sd.length,completos:sd.filter(t=>t.completionStatus==="completo").length,
      rate:sd.length>0?Math.round(sd.filter(t=>t.completionStatus==="completo").length/sd.length*100):null};
  });

  // Timeline
  const tlMap={};
  todos.filter(t=>t.done&&t.completedAt).forEach(t=>{if(!tlMap[t.completedAt])tlMap[t.completedAt]=[];tlMap[t.completedAt].push(t);});
  feed.filter(f=>f.type==="topic").forEach(f=>{if(!tlMap[f.date])tlMap[f.date]=[];tlMap[f.date].push({...f,isTopic:true});});
  const tlDates=Object.keys(tlMap).sort((a,b)=>b.localeCompare(a)).slice(0,10);

  return (
    <div>
      <div style={{marginBottom:20}}>
        <h2 style={{color:T1,fontWeight:500,fontSize:18,margin:0}}>Mis estadísticas</h2>
        <p style={{color:T2,fontSize:13,margin:"4px 0 0"}}>Seguimiento de objetivos y actividad diaria</p>
      </div>

      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:12,marginBottom:16}}>
        {[{icon:"🔥",l:"Racha",v:`${streak} días`,c:streak>0?GOLD:T3},{icon:"🎯",l:"Tasa de éxito",v:`${successRate}%`,c:successRate>=70?GREEN:successRate>0?GOLD:T3},{icon:"⭐",l:"Nota media",v:avgScore,c:T1},{icon:"⚡",l:"XP total",v:xp,c:lv.color}].map((s,i)=>(
          <div key={i} style={{background:CARD2,border:`0.5px solid ${BD}`,borderRadius:12,padding:16}}>
            <div style={{fontSize:18,marginBottom:6}}>{s.icon}</div>
            <div style={{fontSize:10,color:T2,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>{s.l}</div>
            <div style={{fontSize:20,fontWeight:500,color:s.c}}>{s.v}</div>
          </div>
        ))}
      </div>

      {/* Completion + Radar */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
        <div style={crd()}>
          <div style={{fontSize:11,color:T2,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:14}}>Estado de objetivos</div>
          <div style={{display:"flex",alignItems:"flex-start",gap:16}}>
            {/* Mini donut */}
            {(()=>{
              const sz=90, sw=13, rr=(sz-sw*2)/2, c2=2*Math.PI*rr;
              const pC=done.length>0?completos/done.length:0, pP=done.length>0?parciales/done.length:0, pI=done.length>0?incompletos/done.length:0;
              return (
                <div style={{position:"relative",width:sz,height:sz,flexShrink:0}}>
                  <svg width={sz} height={sz}>
                    <circle cx={sz/2} cy={sz/2} r={rr} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth={sw}/>
                    {done.length>0&&<>
                      <circle cx={sz/2} cy={sz/2} r={rr} fill="none" stroke={GREEN} strokeWidth={sw} strokeDasharray={`${c2*pC} ${c2}`} strokeDashoffset={c2*0.25}/>
                      <circle cx={sz/2} cy={sz/2} r={rr} fill="none" stroke={GOLD} strokeWidth={sw} strokeDasharray={`${c2*pP} ${c2}`} strokeDashoffset={c2*0.25-c2*pC}/>
                      <circle cx={sz/2} cy={sz/2} r={rr} fill="none" stroke={CORAL} strokeWidth={sw} strokeDasharray={`${c2*pI} ${c2}`} strokeDashoffset={c2*0.25-c2*(pC+pP)}/>
                    </>}
                  </svg>
                  <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}>
                    <div style={{fontSize:16,fontWeight:500,color:T1}}>{done.length}</div>
                    <div style={{fontSize:9,color:T3}}>hechos</div>
                  </div>
                </div>
              );
            })()}
            <div style={{flex:1}}>
              {[[`Completo`,GREEN,completos],[`Parcial`,GOLD,parciales],[`Incompleto`,CORAL,incompletos],[`Pendiente`,T3,pending.length],[`Vencido`,PINK,overdue]].map(([lb,color,n])=>(
                <div key={lb} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:6,height:6,borderRadius:"50%",background:color}}/><span style={{fontSize:12,color:T2}}>{lb} ({n})</span></div>
                  <div style={{height:3,width:70,background:"rgba(255,255,255,0.06)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:todos.length>0?`${Math.round(n/todos.length*100)}%`:"0%",background:color,borderRadius:2}}/></div>
                </div>
              ))}
              <div style={{borderTop:`0.5px solid ${BD}`,paddingTop:8,marginTop:4,fontSize:11,color:T3}}>
                {todos.length} totales · éxito: <span style={{color:successRate>=70?GREEN:GOLD,fontWeight:500}}>{successRate}%</span>
              </div>
            </div>
          </div>
        </div>
        <div style={crd()}>
          <div style={{fontSize:11,color:T2,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Radar de temas vistos</div>
          <div style={{fontSize:11,color:T3,marginBottom:4}}>% completado por materia</div>
          <svg width="100%" viewBox="0 0 240 200">
            {[0.25,0.5,0.75,1].map((f,i)=><polygon key={i} points={gPts(f)} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="1"/>)}
            {rPts.map((p,i)=><line key={i} x1={cx} y1={cy} x2={p.gx} y2={p.gy} stroke="rgba(255,255,255,0.07)" strokeWidth="1"/>)}
            <polygon points={poly} fill={`${BLUE}20`} stroke={BLUE} strokeWidth="1.5"/>
            {rPts.map((p,i)=>(
              <g key={i}>
                <circle cx={p.x} cy={p.y} r="4" fill={p.s.color}/>
                <text x={p.gx+(p.gx-cx)*0.22} y={p.gy+(p.gy-cy)*0.22+3} textAnchor="middle" fill={T2} fontSize="9">{p.s.short}</text>
              </g>
            ))}
          </svg>
        </div>
      </div>

      {/* Daily bars */}
      <div style={crd({marginBottom:16})}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:11,color:T2,textTransform:"uppercase",letterSpacing:"0.06em"}}>Actividad diaria — últimos 14 días</div>
          <div style={{fontSize:11,color:T3}}>{last14.filter(d=>d.objs+d.topics>0).length}/14 días activos</div>
        </div>
        <div style={{display:"flex",gap:5,alignItems:"flex-end",height:72}}>
          {last14.map((d,i)=>{
            const total=d.objs+d.topics, h=Math.round(total/maxDay*60);
            const hC2=total>0?Math.round(d.completos/total*h):0, hP=total>0?Math.round(d.parciales/total*h):0, hT=Math.round(d.topics/total*h)||0, hRest=Math.max(h-hC2-hP-hT,0);
            return (
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{width:"100%",display:"flex",flexDirection:"column",justifyContent:"flex-end",height:64,gap:0}}>
                  {total>0?<>
                    <div style={{width:"100%",height:Math.max(hRest,0),background:CORAL+"90"}}/>
                    <div style={{width:"100%",height:Math.max(hP,0),background:GOLD}}/>
                    <div style={{width:"100%",height:Math.max(hT,0),background:BLUE+"aa"}}/>
                    <div style={{width:"100%",height:Math.max(hC2,0),background:GREEN,borderRadius:"3px 3px 0 0"}}/>
                  </>:<div style={{width:"100%",height:3,background:"rgba(255,255,255,0.05)",borderRadius:2}}/>}
                </div>
                <div style={{fontSize:9,color:d.isToday?GREEN:T3,fontWeight:d.isToday?500:400}}>{d.label}</div>
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",gap:12,marginTop:10}}>
          {[[GREEN,"Obj. completo"],[GOLD,"Obj. parcial"],[BLUE,"Tema visto"],[CORAL,"Incompleto"]].map(([c,lb])=>(
            <div key={lb} style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:9,height:9,borderRadius:2,background:c}}/><span style={{fontSize:10,color:T3}}>{lb}</span></div>
          ))}
        </div>
      </div>

      {/* Heatmap */}
      <div style={crd({marginBottom:16})}>
        <div style={{fontSize:11,color:T2,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:14}}>Mapa de actividad — últimos 70 días</div>
        <div style={{display:"flex",gap:3}}>
          {hWeeks.map((wk,wi)=><div key={wi} style={{display:"flex",flexDirection:"column",gap:3}}>{wk.map((d,di)=><div key={di} title={`${d.date}: ${d.n} actividades`} style={{width:13,height:13,borderRadius:3,background:hC(d.n)}}/>)}</div>)}
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",marginTop:8}}>
          <span style={{fontSize:10,color:T3}}>Menos actividad</span>
          {["#1A1D2C","#193D2E","#1E6B4A","#27925F","#3DD6A0"].map((c,i)=><div key={i} style={{width:12,height:12,borderRadius:2,background:c}}/>)}
          <span style={{fontSize:10,color:T3}}>Más actividad</span>
        </div>
      </div>

      {/* Per-subject */}
      <div style={crd({marginBottom:16})}>
        <div style={{fontSize:11,color:T2,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:14}}>Objetivos por materia</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
          {bySub.map(s=>(
            <div key={s.id} style={{background:CARD2,border:`0.5px solid ${BD}`,borderRadius:10,padding:"12px 14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:12,fontWeight:500,color:s.color}}>{s.short}</span>
                {s.rate!==null&&<span style={{fontSize:11,color:s.rate>=70?GREEN:s.rate>=40?GOLD:CORAL,fontWeight:500}}>{s.rate}% éxito</span>}
              </div>
              <div style={{fontSize:11,color:T3,marginBottom:6}}>{s.name}</div>
              <div style={{display:"flex",gap:8,fontSize:11}}><span style={{color:GREEN}}>✓ {s.completos}</span><span style={{color:T3}}>/ {s.done} hechos / {s.total} total</span></div>
              {s.total>0&&<div style={{marginTop:7,display:"flex",height:3,borderRadius:2,overflow:"hidden"}}>
                <div style={{width:`${s.completos/s.total*100}%`,background:GREEN}}/>
                <div style={{width:`${(s.done-s.completos)/s.total*100}%`,background:GOLD}}/>
                <div style={{flex:1,background:"rgba(255,255,255,0.06)"}}/>
              </div>}
            </div>
          ))}
        </div>
      </div>

      {/* Timeline */}
      <div style={crd()}>
        <div style={{fontSize:11,color:T2,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:16}}>Línea de tiempo — actividad reciente</div>
        {tlDates.length===0?(
          <div style={{textAlign:"center",padding:"24px 0",color:T3,fontSize:13}}><div style={{fontSize:28,marginBottom:8}}>🎯</div>Completá objetivos y marcá temas para ver tu historial aquí.</div>
        ):tlDates.map((date,di)=>{
          const items=tlMap[date];
          const isToday=date===today;
          return (
            <div key={date} style={{display:"flex",gap:16,marginBottom:18}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:isToday?GREEN:T3,flexShrink:0,marginTop:3,boxShadow:isToday?`0 0 8px ${GREEN}`:"none"}}/>
                {di<tlDates.length-1&&<div style={{width:1,flex:1,background:`linear-gradient(${BD2},transparent)`,marginTop:4,minHeight:20}}/>}
              </div>
              <div style={{flex:1,paddingBottom:4}}>
                <div style={{fontSize:12,color:isToday?GREEN:T2,fontWeight:500,marginBottom:8}}>{isToday?"Hoy":fmtDate(date)}<span style={{fontSize:10,color:T3,fontWeight:400}}> · {items.length} actividades</span></div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {items.map((item,ii)=>{
                    const s=SUBJECTS.find(sub=>sub.id===item.subjectId);
                    const cs_=item.isTopic?null:COMP_ST[item.completionStatus];
                    return (
                      <div key={item.id||ii} style={{display:"flex",alignItems:"center",gap:5,background:s?.glow,border:`0.5px solid ${cs_?cs_.color+"40":s?.color+"30"}`,borderRadius:20,padding:"3px 10px"}}>
                        <div style={{width:5,height:5,borderRadius:"50%",background:cs_?cs_.color:s?.color}}/>
                        <span style={{fontSize:11,color:T1}}>{item.text}</span>
                        {!item.isTopic&&item.score&&<span style={{fontSize:10,color:cs_?.color}}>{Array.from({length:item.score}).map((_,j)=><span key={j}>★</span>)}</span>}
                        <span style={{fontSize:9,color:T3}}>+{item.xp||10} XP</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]    = useState("dashboard");
  const [data,setData]    = useState(null);
  const [selSub,setSub]   = useState(SUBJECTS[0].id);
  const [calMonth,setCM]  = useState(new Date().getMonth());
  const [calYear,setCY]   = useState(new Date().getFullYear());

  useEffect(()=>{
    const def=mkDefault();
    try{ const s=localStorage.getItem(KEY); setData(s?{...def,...JSON.parse(s)}:def); }
    catch{ setData(def); }
  },[]);

  useEffect(()=>{ if(data) try{localStorage.setItem(KEY,JSON.stringify(data));}catch{} },[data]);

  if(!data) return <div style={{background:BG,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:T2,fontSize:14}}>Cargando...</div>;

  const getP = sid => calcPct(data,sid);
  const upEvents = [...(data.events||[])].sort((a,b)=>a.date.localeCompare(b.date)).filter(e=>e.date>=todayStr());
  const xp=calcXP(data), lv=getLevel(xp), streak=calcStreak(data.feed||[]);
  const todos=data.todos||[];
  const pendingCount=todos.filter(t=>!t.done).length;
  const overdueCount=todos.filter(t=>!t.done&&t.deadline&&daysUntil(t.deadline)<0).length;

  const updTopic=(sid,idx,st)=>setData(d=>{
    const nd={...d,topicStatus:{...d.topicStatus,[sid]:{...d.topicStatus[sid],[idx]:st}}};
    if(st==="visto"){const s=SUBJECTS.find(sub=>sub.id===sid);nd.feed=[...(d.feed||[]),{id:Date.now().toString(),date:todayStr(),time:timeStr(),subjectId:sid,text:s?.topics[idx]||"Tema completado",type:"topic",xp:10}];}
    return nd;
  });
  const addEvent=ev=>setData(d=>({...d,events:[...d.events,ev]}));
  const deleteEvent=id=>setData(d=>({...d,events:d.events.filter(e=>e.id!==id)}));
  const addTodo=t=>setData(d=>({...d,todos:[...d.todos,t]}));
  const completeTodo=(id,completionStatus,score)=>setData(d=>{
    const todo=(d.todos||[]).find(t=>t.id===id); if(!todo) return d;
    const xpMap={completo:15,parcial:8,incompleto:3};
    const todos=d.todos.map(t=>t.id===id?{...t,done:true,completionStatus,score,completedAt:todayStr()}:t);
    const feed=[...(d.feed||[]),{id:Date.now().toString()+"_t",date:todayStr(),time:timeStr(),subjectId:todo.subjectId,text:todo.text,type:"todo",xp:xpMap[completionStatus]||5,completionStatus,score}];
    return{...d,todos,feed};
  });
  const undoTodo=id=>setData(d=>({...d,todos:d.todos.map(t=>t.id===id?{...t,done:false,completionStatus:null,score:null,completedAt:null}:t)}));
  const deleteTodo=id=>setData(d=>({...d,todos:d.todos.filter(t=>t.id!==id)}));
  const updNote=(sid,note)=>setData(d=>({...d,notes:{...d.notes,[sid]:note}}));
  const updFinal=(sid,field,val)=>setData(d=>({...d,finals:{...d.finals,[sid]:{...d.finals[sid],[field]:val}}}));
  const updRes=(sid,action,payload)=>setData(d=>{
    const cur=d.resources?.[sid]||[];
    const next=action==="add"?[...cur,payload]:cur.filter(r=>r.id!==payload);
    return{...d,resources:{...d.resources,[sid]:next}};
  });

  const NAV=[
    {id:"dashboard",   icon:"◈", label:"Panel"},
    {id:"materias",    icon:"◉", label:"Materias"},
    {id:"calendario",  icon:"◷", label:"Calendario"},
    {id:"objetivos",   icon:"◻", label:"Objetivos", badge:overdueCount>0?overdueCount:null},
    {id:"finales",     icon:"◆", label:"Finales"},
    {id:"stats",       icon:"◎", label:"Mis stats"},
  ];

  return (
    <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",background:BG,minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{background:CARD,borderBottom:`0.5px solid ${BD}`,padding:"11px 20px",display:"flex",alignItems:"center",gap:14,position:"sticky",top:0,zIndex:100}}>
        <div style={{width:32,height:32,background:"linear-gradient(135deg,#5BA8F5,#8B5CF6)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:16,flexShrink:0}}>◈</div>
        <div><div style={{fontWeight:500,fontSize:14,color:T1,lineHeight:1.2}}>Mi Cuatrimestre 2025</div><div style={{fontSize:10,color:T3}}>7 materias · 5 cursadas + 2 finales</div></div>
        <div style={{marginLeft:"auto",display:"flex",gap:10,alignItems:"center"}}>
          {streak>0&&<div style={{display:"flex",alignItems:"center",gap:5,background:"rgba(240,184,74,0.12)",borderRadius:20,padding:"4px 12px"}}><span style={{fontSize:14}}>🔥</span><span style={{fontSize:12,color:GOLD,fontWeight:500}}>{streak} días</span></div>}
          <div style={{display:"flex",alignItems:"center",gap:6,background:lv.color+"18",borderRadius:20,padding:"4px 12px"}}><span style={{fontSize:11,color:lv.color,fontWeight:500}}>{lv.name}</span><span style={{fontSize:11,color:T3}}>· {xp} XP</span></div>
        </div>
      </div>

      <div style={{display:"flex",flex:1}}>
        {/* Sidebar */}
        <div style={{width:164,background:CARD,borderRight:`0.5px solid ${BD}`,padding:"14px 0",flexShrink:0,display:"flex",flexDirection:"column",position:"sticky",top:54,height:"calc(100vh - 54px)",alignSelf:"flex-start",overflowY:"auto"}}>
          {NAV.map(item=>(
            <button key={item.id} onClick={()=>setView(item.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"9px 16px",border:"none",cursor:"pointer",background:view===item.id?CARD2:"transparent",color:view===item.id?T1:T2,fontSize:13,fontWeight:view===item.id?500:400,textAlign:"left",borderLeft:view===item.id?`2px solid ${BLUE}`:"2px solid transparent"}}>
              <span style={{fontSize:13,color:view===item.id?BLUE:T3}}>{item.icon}</span>
              <span style={{flex:1}}>{item.label}</span>
              {item.badge&&<span style={{background:PINK,color:"white",fontSize:10,fontWeight:500,borderRadius:"50%",width:17,height:17,display:"flex",alignItems:"center",justifyContent:"center"}}>{item.badge}</span>}
            </button>
          ))}
          <div style={{margin:"14px 14px 6px",borderTop:`0.5px solid ${BD}`,paddingTop:14}}>
            <div style={{fontSize:9,textTransform:"uppercase",letterSpacing:"0.08em",color:T3,marginBottom:10}}>Materias</div>
            {SUBJECTS.map(s=>{
              const pct=getP(s.id);
              return (
                <div key={s.id} onClick={()=>{setSub(s.id);setView("materias");}} style={{display:"flex",alignItems:"center",gap:7,padding:"5px 0",cursor:"pointer"}}>
                  <div style={{width:6,height:6,borderRadius:s.finalOnly?0:"50%",background:s.color,flexShrink:0}}/>
                  <span style={{fontSize:10,color:T2,flex:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.short}</span>
                  <span style={{fontSize:9,color:s.color,fontWeight:500}}>{pct}%</span>
                </div>
              );
            })}
          </div>
        </div>

        {/* Content */}
        <div style={{flex:1,padding:24,overflowY:"auto",minWidth:0}}>
          {view==="dashboard"  &&<Dashboard  data={data} getP={getP} setView={setView} setSub={setSub} upEvents={upEvents} pendingCount={pendingCount}/>}
          {view==="materias"   &&<Materias   data={data} selSub={selSub} setSub={setSub} updTopic={updTopic} updNote={updNote} getP={getP} updRes={updRes}/>}
          {view==="calendario" &&<Calendario data={data} month={calMonth} year={calYear} setMonth={setCM} setYear={setCY} addEvent={addEvent} deleteEvent={deleteEvent}/>}
          {view==="objetivos"  &&<Objetivos  data={data} addTodo={addTodo} completeTodo={completeTodo} undoTodo={undoTodo} deleteTodo={deleteTodo}/>}
          {view==="finales"    &&<Finales    data={data} updFinal={updFinal} getP={getP}/>}
          {view==="stats"      &&<PanelStats data={data} getP={getP}/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
