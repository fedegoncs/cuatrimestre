<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mi Cuatrimestre 2025</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0A0C14;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
  input,select,textarea,button{font-family:inherit;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:#11131D;}
  ::-webkit-scrollbar-thumb{background:#2a2d3e;border-radius:3px;}
  @keyframes popIn{0%{transform:scale(1)}40%{transform:scale(1.4)}70%{transform:scale(0.9)}100%{transform:scale(1)}}
  @keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  .pop{animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);}
  .slide{animation:slideIn 0.25s ease;}
</style>

<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useRef}=React;

// ─── DATA ─────────────────────────────────────────────────────────────────────
const SUBJECTS=[

  {id:"estadistica",name:"Estadística Aplicada",               short:"EST.",  color:"#F07B52",glow:"rgba(240,123,82,0.15)",   finalOnly:false,
   topics:["Variables aleatorias","Normal y t-Student","Chi-cuadrado y F","Estimación puntual e intervalar","Test de hipótesis","Bondad de ajuste","Regresión lineal simple","Regresión lineal múltiple","ANOVA","Control estadístico de procesos (SPC)"]},
  {id:"finanzas",   name:"Finanzas y Evaluación de Proyectos", short:"FIN.",  color:"#F0B84A",glow:"rgba(240,184,74,0.15)",   finalOnly:false,
   topics:[

     "IVA — aplicaciones en evaluación de proyectos",
     "Inflación en evaluación de proyectos",
     "Aplicaciones de probabilidad al riesgo",
     "Simulación Montecarlo",
   ]},
  {id:"estabilidad",name:"Estabilidad",                        short:"ESTAB", color:"#7ED458",glow:"rgba(126,212,88,0.15)",   finalOnly:true,
   topics:["Sistemas de fuerzas — estática general","Equilibrio de sólidos rígidos","Celosías y estructuras articuladas","Vigas — esfuerzo cortante y momento flector","Diagramas My y Q","Torsión en barras circulares","Tensión normal y tangencial compuestas","Deformaciones — círculo de Mohr","Pandeo de columnas — Euler","Líneas de influencia"]},
  {id:"electrotecnia",name:"Electrotecnia",                    short:"ELEC",  color:"#F46FAE",glow:"rgba(244,111,174,0.15)",  finalOnly:true,
   topics:["Circuitos CC — leyes de Kirchhoff","Teoremas de Thevenin y Norton","Análisis de circuitos AC — fasores","Potencia activa, reactiva y aparente","Circuitos trifásicos equilibrados","Circuitos trifásicos desequilibrados","Transformadores — fundamentos","Resonancia y filtros","Transitorios en circuitos RL y RC","Mediciones eléctricas y errores"]},

const FINAL_ST={
  pendiente:{label:"Pendiente",color:"rgba(255,255,255,0.3)", bg:"rgba(255,255,255,0.05)"},
  inscripto: {label:"Inscripto", color:"#F0B84A",             bg:"rgba(240,184,74,0.12)"},
  rendido:   {label:"Rendido",   color:"#5BA8F5",             bg:"rgba(91,168,245,0.12)"},
  aprobado:  {label:"Aprobado ✓",color:"#3DD6A0",             bg:"rgba(61,214,160,0.12)"},
};
const PRIO={
  alta: {label:"Alta", color:"#F07B52",bg:"rgba(240,123,82,0.12)"},
  media:{label:"Media",color:"#F0B84A",bg:"rgba(240,184,74,0.10)"},
  baja: {label:"Baja", color:"#3DD6A0",bg:"rgba(61,214,160,0.10)"},
};

// ─── THEME ────────────────────────────────────────────────────────────────────
const BG="#0A0C14",CARD="#11131D",CARD2="#181B27",CARD3="#1F2230";
const BD="rgba(255,255,255,0.07)",BD2="rgba(255,255,255,0.13)";
const T1="rgba(255,255,255,0.93)",T2="rgba(255,255,255,0.50)",T3="rgba(255,255,255,0.22)";
const GREEN="#3DD6A0",GOLD="#F0B84A",CORAL="#F07B52",BLUE="#5BA8F5";
const KEY="cuatri_gh_v1";
const MONTHS=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DAYS_S=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

// ─── UTILS ────────────────────────────────────────────────────────────────────
const todayStr=()=>new Date().toISOString().split("T")[0];
const timeStr=()=>new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});
const fmtDate=ds=>{const d=new Date(ds+"T12:00:00");return `${d.getDate()} ${["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"][d.getMonth()]}`;};

const mkDefault=()=>({
  topicStatus:Object.fromEntries(SUBJECTS.map(s=>[s.id,Object.fromEntries(s.topics.map((_,i)=>[i,"pendiente"]))])),
  events:[],todos:[],
  notes:Object.fromEntries(SUBJECTS.map(s=>[s.id,""])),
  finals:Object.fromEntries(SUBJECTS.map(s=>[s.id,{date:"",status:"pendiente",nota:""}])),
  horasLog:[],feed:[],
});

const calcPct=(data,sid)=>{const v=Object.values(data.topicStatus?.[sid]||{});return v.length?Math.round(v.filter(x=>x==="visto").length/v.length*100):0;};
const calcXP=data=>SUBJECTS.reduce((a,s)=>a+Object.values(data.topicStatus?.[s.id]||{}).filter(v=>v==="visto").length,0)*10+(data.todos||[]).filter(t=>t.done).length*5;
const getLevel=xp=>xp>=800?{name:"Imparable 🏆",color:GOLD}:xp>=500?{name:"Modo bestia 🔥",color:CORAL}:xp>=300?{name:"Enganchado ⚡",color:GREEN}:xp>=150?{name:"En zona 🎯",color:"#9D8EF5"}:xp>=50?{name:"Tomando ritmo",color:BLUE}:{name:"Arrancando",color:T2};
const calcStreak=feed=>{
  if(!feed?.length)return 0;
  const dates=new Set(feed.map(f=>f.date));
  const prev=d=>{const x=new Date(d);x.setDate(x.getDate()-1);return x.toISOString().split("T")[0];};
  let streak=0,check=todayStr();
  while(dates.has(check)){streak++;check=prev(check);}
  if(streak===0){check=prev(todayStr());while(dates.has(check)){streak++;check=prev(check);}}
  return streak;
};

// ─── PRIMITIVES ───────────────────────────────────────────────────────────────
const cs=(extra={})=>({background:CARD,border:`0.5px solid ${BD}`,borderRadius:14,padding:20,...extra});

function Ring({pct,color,size=88,sw=7,children}){
  const r=(size-sw*2)/2,circ=2*Math.PI*r,off=circ*(1-pct/100);
  return(
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={sw}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw}
          strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
          style={{transition:"stroke-dashoffset 0.8s ease"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{children}</div>
    </div>
  );
}

function PBar({pct,color,h=4}){
  return(
    <div style={{height:h,background:"rgba(255,255,255,0.06)",borderRadius:h,overflow:"hidden"}}>
      <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:h,transition:"width 0.7s ease"}}/>
    </div>
  );
}

function Badge({label,color,bg}){return <span style={{fontSize:11,fontWeight:500,padding:"2px 9px",borderRadius:20,background:bg,color,whiteSpace:"nowrap"}}>{label}</span>;}

function Btn({onClick,children,primary,style={}}){
  return <button onClick={onClick} style={{padding:"8px 18px",borderRadius:9,border:`0.5px solid ${primary?BLUE:BD2}`,background:primary?BLUE:"transparent",cursor:"pointer",fontSize:13,color:primary?"white":T1,...style}}>{children}</button>;
}

const IS={width:"100%",padding:"9px 12px",borderRadius:9,border:`0.5px solid ${BD2}`,background:CARD2,color:T1,fontSize:13,boxSizing:"border-box"};
function FR({label,children}){return <div style={{marginBottom:14}}><div style={{fontSize:11,color:T2,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>{children}</div>;}

function Modal({show,onClose,title,children}){
  if(!show)return null;
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:CARD,borderRadius:20,padding:28,width:430,maxWidth:"92vw",border:`0.5px solid ${BD2}`}}>
        <div style={{fontWeight:500,fontSize:16,color:T1,marginBottom:20}}>{title}</div>
        {children}
      </div>
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({data,getP,setView,setSub,upEvents,pendTodos}){
  const xp=calcXP(data),lv=getLevel(xp),streak=calcStreak(data.feed||[]);
  const today=todayStr(),todayFeed=(data.feed||[]).filter(f=>f.date===today).slice().reverse();
  const totalDone=SUBJECTS.reduce((a,s)=>a+Object.values(data.topicStatus?.[s.id]||{}).filter(v=>v==="visto").length,0);
  const totalT=SUBJECTS.reduce((a,s)=>a+s.topics.length,0);
  const nextXP=xp>=800?800:[50,150,300,500,800].find(n=>n>xp)||800;
  const prevXP=xp>=800?500:xp>=500?300:xp>=300?150:xp>=150?50:0;
  const xpPct=Math.min(100,Math.round((xp-prevXP)/(nextXP-prevXP)*100));

  return(
    <div>
      <div style={{...cs({padding:"14px 20px",marginBottom:16,display:"flex",alignItems:"center",gap:16})}}>
        <div style={{flex:1}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <span style={{fontSize:13,fontWeight:500,color:lv.color}}>{lv.name}</span>
            <span style={{fontSize:12,color:T2}}>{xp} XP</span>
          </div>
          <PBar pct={xpPct} color={lv.color} h={5}/>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:12,marginBottom:20}}>
        {[
          {icon:"🔥",label:"Racha",      val:`${streak} días`,        color:streak>0?GOLD:T3},
          {icon:"📚",label:"Temas",      val:`${totalDone}/${totalT}`, color:T1},
          {icon:"✅",label:"Hoy",         val:`${todayFeed.length}`,    color:todayFeed.length>0?GREEN:T3},
          {icon:"📝",label:"Pendientes", val:pendTodos.length,          color:pendTodos.length>3?CORAL:T1},
        ].map((s,i)=>(
          <div key={i} style={{background:CARD2,border:`0.5px solid ${BD}`,borderRadius:12,padding:16}}>
            <div style={{fontSize:18,marginBottom:6}}>{s.icon}</div>
            <div style={{fontSize:10,color:T2,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>{s.label}</div>
            <div style={{fontSize:22,fontWeight:500,color:s.color}}>{s.val}</div>
          </div>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 285px",gap:16}}>
        <div>
          <div style={{fontSize:11,color:T3,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:12}}>Cursando</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:16}}>
            {SUBJECTS.filter(s=>!s.finalOnly).map(s=>{
              const pct=getP(s.id),visto=Object.values(data.topicStatus?.[s.id]||{}).filter(v=>v==="visto").length;
              return(
                <div key={s.id} onClick={()=>{setSub(s.id);setView("materias");}}
                  style={{background:CARD2,border:`0.5px solid ${BD}`,borderRadius:14,padding:"16px 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:10,transition:"border-color 0.2s"}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=s.color+"70"}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=BD}>
                  <Ring pct={pct} color={s.color} size={70} sw={6}><span style={{fontSize:12,fontWeight:500,color:T1}}>{pct}%</span></Ring>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:11,fontWeight:500,color:s.color}}>{s.short}</div>
                    <div style={{fontSize:10,color:T3,marginTop:2}}>{visto}/{s.topics.length}</div>
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{fontSize:11,color:T3,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:12}}>Solo final</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {SUBJECTS.filter(s=>s.finalOnly).map(s=>{
              const pct=getP(s.id),visto=Object.values(data.topicStatus?.[s.id]||{}).filter(v=>v==="visto").length;
              return(
                <div key={s.id} onClick={()=>{setSub(s.id);setView("materias");}}
                  style={{background:CARD2,border:`0.5px dashed ${s.color}50`,borderRadius:14,padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,transition:"border-color 0.2s"}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=s.color+"90"}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=s.color+"50"}>
                  <Ring pct={pct} color={s.color} size={56} sw={5}><span style={{fontSize:10,fontWeight:500,color:T1}}>{pct}%</span></Ring>
                  <div>
                    <div style={{fontSize:11,fontWeight:500,color:s.color}}>{s.short} <span style={{fontSize:9,color:T3}}>final</span></div>
                    <div style={{fontSize:12,color:T2,marginTop:2}}>{s.name}</div>
                    <div style={{fontSize:10,color:T3,marginTop:3}}>{visto}/{s.topics.length} vistos</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{...cs({flex:1})}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <span style={{fontSize:11,color:T2,textTransform:"uppercase",letterSpacing:"0.07em"}}>Actividad hoy</span>
              {todayFeed.length>0&&<span style={{fontSize:11,color:GREEN,fontWeight:500}}>{todayFeed.length} ✓</span>}
            </div>
            {todayFeed.length===0?(
              <div style={{textAlign:"center",padding:"16px 0"}}>
                <div style={{fontSize:30,marginBottom:8}}>📖</div>
                <div style={{fontSize:12,color:T3}}>Todavía no marcaste nada.</div>
                <div style={{fontSize:11,color:T3,marginTop:4}}>¡Hoy es buen día para estudiar!</div>
              </div>
            ):todayFeed.slice(0,6).map(item=>{
              const s=SUBJECTS.find(sub=>sub.id===item.subjectId);
              return(
                <div key={item.id} className="slide" style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:10}}>
                  <div style={{width:7,height:7,borderRadius:"50%",background:s?.color,flexShrink:0,marginTop:4}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,color:T1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.text}</div>
                    <div style={{fontSize:10,color:T3}}>{s?.short} · {item.time} · +{item.xp} XP</div>
                  </div>
                </div>
              );
            })}
          </div>
          <div style={cs()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontSize:11,color:T2,textTransform:"uppercase",letterSpacing:"0.07em"}}>Próximos</span>
              <span onClick={()=>setView("calendario")} style={{fontSize:11,color:BLUE,cursor:"pointer"}}>ver todos →</span>
            </div>
            {upEvents.length===0?<div style={{fontSize:12,color:T3,cursor:"pointer"}} onClick={()=>setView("calendario")}>Sin eventos. Agregar →</div>
              :upEvents.slice(0,3).map(ev=>{
                const s=SUBJECTS.find(sub=>sub.id===ev.subjectId);
                return(
                  <div key={ev.id} style={{display:"flex",gap:10,marginBottom:10}}>
                    <div style={{fontSize:11,background:s?.glow,color:s?.color,borderRadius:5,padding:"2px 7px",whiteSpace:"nowrap",fontWeight:500}}>{ev.date.slice(5).replace("-","/")}</div>
                    <div><div style={{fontSize:12,color:T1}}>{ev.description}</div><div style={{fontSize:10,color:T3}}>{ev.type} · {s?.short}</div></div>
                  </div>
                );
              })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── MATERIAS ─────────────────────────────────────────────────────────────────
function Materias({data,selSub,setSub,updTopic,updNote,getP}){
  const [popped,setPopped]=useState(new Set());
  const sub=SUBJECTS.find(s=>s.id===selSub);
  const pct=getP(selSub),sts=data.topicStatus?.[selSub]||{};
  const visto=Object.values(sts).filter(v=>v==="visto").length;

  const cycle=idx=>{
    const order=["pendiente","en curso","visto"],cur=sts[idx]||"pendiente";
    const next=order[(order.indexOf(cur)+1)%order.length];
    updTopic(selSub,idx,next);
    if(next==="visto"){
      const k=`${selSub}-${idx}`;setPopped(p=>new Set([...p,k]));
      setTimeout(()=>setPopped(p=>{const n=new Set(p);n.delete(k);return n;}),700);
    }
  };
  const stS={
    pendiente:{color:T3, bg:"rgba(255,255,255,0.05)",label:"Pendiente"},
    "en curso":{color:GOLD,bg:"rgba(240,184,74,0.12)", label:"En curso"},
    visto:     {color:GREEN,bg:"rgba(61,214,160,0.12)",label:"Visto ✓"},
  };

  return(
    <div>
      <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:11,color:T3}}>Cursando:</span>
        {SUBJECTS.filter(s=>!s.finalOnly).map(s=>(
          <button key={s.id} onClick={()=>setSub(s.id)} style={{padding:"5px 12px",borderRadius:20,cursor:"pointer",border:selSub===s.id?`1.5px solid ${s.color}`:`0.5px solid ${BD}`,background:selSub===s.id?s.glow:"transparent",color:selSub===s.id?s.color:T2,fontSize:12,fontWeight:selSub===s.id?500:400}}>{s.short}</button>
        ))}
        <span style={{fontSize:11,color:T3,marginLeft:8}}>Solo final:</span>
        {SUBJECTS.filter(s=>s.finalOnly).map(s=>(
          <button key={s.id} onClick={()=>setSub(s.id)} style={{padding:"5px 12px",borderRadius:20,cursor:"pointer",border:selSub===s.id?`1.5px dashed ${s.color}`:`0.5px dashed ${BD}`,background:selSub===s.id?s.glow:"transparent",color:selSub===s.id?s.color:T2,fontSize:12}}>{s.short}</button>

// ─── ESTADÍSTICAS ─────────────────────────────────────────────────────────────
function Estadisticas({data,addHoras,delHoras,getP}){
  const [showAdd,setShowAdd]=useState(false);
  const [nLog,setNLog]=useState({subjectId:SUBJECTS[0].id,horas:"1",fecha:todayStr(),nota:""});
  const horasPM=SUBJECTS.map(s=>({...s,horas:(data.horasLog||[]).filter(l=>l.subjectId===s.id).reduce((a,l)=>a+Number(l.horas||0),0)}));
  const maxH=Math.max(...horasPM.map(h=>h.horas),1),totalH=horasPM.reduce((a,h)=>a+h.horas,0);
  const xp=calcXP(data),streak=calcStreak(data.feed||[]),lv=getLevel(xp);
  const today=todayStr(),todayCount=(data.feed||[]).filter(f=>f.date===today).length;

  const allFeed=[...(data.feed||[])].sort((a,b)=>b.date.localeCompare(a.date)||b.time.localeCompare(a.time));
  const byDate={};allFeed.forEach(f=>{if(!byDate[f.date])byDate[f.date]=[];byDate[f.date].push(f);});
  const feedDates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a)).slice(0,12);

  const heatH={};(data.horasLog||[]).forEach(l=>{heatH[l.fecha]=(heatH[l.fecha]||0)+Number(l.horas||0);});
  const heatDays=[];for(let i=69;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const s=d.toISOString().split("T")[0];heatDays.push({date:s,h:heatH[s]||0});}
  const heatWeeks=[];for(let i=0;i<heatDays.length;i+=7)heatWeeks.push(heatDays.slice(i,i+7));
  const hC=h=>!h?"#1A1D2C":h<1?"#193D2E":h<2?"#1E6B4A":h<3?"#27925F":"#3DD6A0";

  const doAdd=()=>{if(!nLog.horas||!nLog.fecha)return;addHoras({...nLog,id:Date.now().toString()});setShowAdd(false);setNLog({subjectId:SUBJECTS[0].id,horas:"1",fecha:todayStr(),nota:""});};

  const radarPts=SUBJECTS.map((s,i)=>{const angle=(2*Math.PI*i/SUBJECTS.length)-Math.PI/2,pct=getP(s.id)/100,cx=130,cy=110,r=85;return{x:cx+r*pct*Math.cos(angle),y:cy+r*pct*Math.sin(angle),gx:cx+r*Math.cos(angle),gy:cy+r*Math.sin(angle),s,pct,cx,cy,r,i};});
  const gridLevels=[0.25,0.5,0.75,1].map(f=>SUBJECTS.map((_,i)=>{const angle=(2*Math.PI*i/SUBJECTS.length)-Math.PI/2;return `${130+85*f*Math.cos(angle)},${110+85*f*Math.sin(angle)}`;}).join(" "));
  const poly=radarPts.map(p=>`${p.x},${p.y}`).join(" ");

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div><h2 style={{color:T1,fontWeight:500,fontSize:18,margin:0}}>Estadísticas</h2><p style={{color:T2,fontSize:13,margin:"4px 0 0"}}>Tu progreso, tiempo y tendencias</p></div>
        <Btn onClick={()=>setShowAdd(true)}>+ Registrar sesión</Btn>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:12,marginBottom:16}}>
        {[{l:"Racha",v:`${streak} días`,c:streak>0?GOLD:T3},{l:"Nivel",v:lv.name,c:lv.color},{l:"Horas totales",v:`${totalH}h`,c:T1},{l:"Hoy completé",v:todayCount,c:todayCount>0?GREEN:T3}].map((s,i)=>(
          <div key={i} style={{background:CARD2,border:`0.5px solid ${BD}`,borderRadius:12,padding:16}}>
            <div style={{fontSize:10,color:T2,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>{s.l}</div>
            <div style={{fontSize:18,fontWeight:500,color:s.c}}>{s.v}</div>
          </div>
        ))}
      </div>

      <div style={{...cs({marginBottom:16})}}>
        <div style={{fontSize:11,color:T2,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:14}}>Mapa de actividad — últimos 70 días</div>
        <div style={{display:"flex",gap:3}}>
          {heatWeeks.map((wk,wi)=>(
            <div key={wi} style={{display:"flex",flexDirection:"column",gap:3}}>
              {wk.map((d,di)=><div key={di} title={`${d.date}: ${d.h}h`} style={{width:13,height:13,borderRadius:3,background:hC(d.h)}}/>)}
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",marginTop:8}}>
          <span style={{fontSize:10,color:T3}}>Menos</span>
          {["#1A1D2C","#193D2E","#1E6B4A","#27925F","#3DD6A0"].map((c,i)=><div key={i} style={{width:12,height:12,borderRadius:2,background:c}}/>)}
          <span style={{fontSize:10,color:T3}}>Más horas</span>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
        <div style={cs()}>
          <div style={{fontSize:11,color:T2,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:16}}>Horas por materia</div>
          {horasPM.map(h=>(
            <div key={h.id} style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:12,color:T2}}>{h.name}</span><span style={{fontSize:12,color:h.color,fontWeight:500}}>{h.horas}h</span></div>
              <div style={{height:5,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.round(h.horas/maxH*100)}%`,background:h.color,borderRadius:3,transition:"width 0.7s"}}/></div>
            </div>
          ))}
          {totalH===0&&<div style={{fontSize:12,color:T3,marginTop:8}}>Registrá sesiones para ver la distribución.</div>}
        </div>
        <div style={cs()}>
          <div style={{fontSize:11,color:T2,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Radar de progreso</div>
          <div style={{fontSize:11,color:T3,marginBottom:8}}>Balance entre las 7 materias</div>
          <svg width="100%" viewBox="0 0 260 220">
            {gridLevels.map((g,i)=><polygon key={i} points={g} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="1"/>)}
            {radarPts.map((p,i)=><line key={i} x1={p.cx} y1={p.cy} x2={p.gx} y2={p.gy} stroke="rgba(255,255,255,0.07)" strokeWidth="1"/>)}
            <polygon points={poly} fill={`${BLUE}20`} stroke={BLUE} strokeWidth="1.5"/>
            {radarPts.map((p,i)=>(
              <g key={i}>
                <circle cx={p.x} cy={p.y} r="4" fill={p.s.color}/>
                <text x={p.gx+(p.gx-p.cx)*0.25} y={p.gy+(p.gy-p.cy)*0.25+3} textAnchor="middle" fill={T2} fontSize="9">{p.s.short}</text>
              </g>
            ))}
          </svg>
        </div>
      </div>

      <div style={{...cs({marginBottom:16})}}>
        <div style={{fontSize:11,color:T2,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:16}}>Línea de tiempo — completados</div>
        {feedDates.length===0?(
          <div style={{textAlign:"center",padding:"24px 0",color:T3,fontSize:13}}><div style={{fontSize:28,marginBottom:8}}>🎯</div>Marcá temas y tareas para ver tu historial aquí.</div>
        ):feedDates.map((date,di)=>{
          const items=byDate[date],isToday=date===today;
          return(
            <div key={date} style={{display:"flex",gap:16,marginBottom:22}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:isToday?GREEN:T3,flexShrink:0,marginTop:3,boxShadow:isToday?`0 0 8px ${GREEN}`:"none"}}/>
                {di<feedDates.length-1&&<div style={{width:1,flex:1,background:`linear-gradient(${BD2},transparent)`,marginTop:4,minHeight:24}}/>}
              </div>
              <div style={{flex:1,paddingBottom:4}}>
                <div style={{fontSize:12,color:isToday?GREEN:T2,fontWeight:500,marginBottom:8}}>{isToday?"Hoy":fmtDate(date)}<span style={{fontSize:10,color:T3,fontWeight:400}}> · {items.length} completados</span></div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {items.map(item=>{
                    const s=SUBJECTS.find(sub=>sub.id===item.subjectId);
                    return(
                      <div key={item.id} style={{display:"flex",alignItems:"center",gap:6,background:s?.glow,border:`0.5px solid ${s?.color}40`,borderRadius:20,padding:"4px 10px"}}>
                        <div style={{width:5,height:5,borderRadius:"50%",background:s?.color}}/>
                        <span style={{fontSize:11,color:T1}}>{item.text}</span>
                        <span style={{fontSize:9,color:s?.color}}>+{item.xp} XP</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        })}
      </div>

      <div style={cs()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontSize:11,color:T2,textTransform:"uppercase",letterSpacing:"0.06em"}}>Sesiones registradas</div>
          <span style={{fontSize:11,color:T3}}>{(data.horasLog||[]).length} sesiones · {totalH}h</span>
        </div>
        {(data.horasLog||[]).length===0?<div style={{fontSize:12,color:T3}}>Sin sesiones. <span style={{color:BLUE,cursor:"pointer"}} onClick={()=>setShowAdd(true)}>Registrar →</span></div>
          :<div style={{maxHeight:260,overflowY:"auto"}}>
            {[...(data.horasLog||[])].sort((a,b)=>b.fecha.localeCompare(a.fecha)).map(log=>{
              const s=SUBJECTS.find(sub=>sub.id===log.subjectId);
              return(
                <div key={log.id} style={{display:"flex",gap:12,alignItems:"center",padding:"9px 0",borderBottom:`0.5px solid ${BD}`}}>
                  <div style={{background:s?.glow,color:s?.color,borderRadius:6,padding:"3px 8px",fontSize:11,fontWeight:500,whiteSpace:"nowrap"}}>{log.fecha.slice(5).replace("-","/")}</div>
                  <div style={{flex:1}}><div style={{fontSize:12,color:T1}}>{s?.name}</div>{log.nota&&<div style={{fontSize:10,color:T3}}>{log.nota}</div>}</div>
                  <div style={{fontWeight:500,fontSize:14,color:s?.color}}>{log.horas}h</div>
                  <button onClick={()=>delHoras(log.id)} style={{border:"none",background:"transparent",cursor:"pointer",color:T3,fontSize:16}}>×</button>
                </div>
              );
            })}
          </div>}
      </div>
      <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="Registrar sesión de estudio">
        <FR label="Materia"><select value={nLog.subjectId} onChange={e=>setNLog(n=>({...n,subjectId:e.target.value}))} style={IS}>{SUBJECTS.map(s=><option key={s.id} value={s.id}>{s.name}{s.finalOnly?" (final)":""}</option>)}</select></FR>
        <FR label="Horas"><input type="number" min="0.5" max="12" step="0.5" value={nLog.horas} onChange={e=>setNLog(n=>({...n,horas:e.target.value}))} style={IS}/></FR>
        <FR label="Fecha"><input type="date" value={nLog.fecha} onChange={e=>setNLog(n=>({...n,fecha:e.target.value}))} style={IS}/></FR>
        <FR label="Nota (opcional)"><input type="text" value={nLog.nota} onChange={e=>setNLog(n=>({...n,nota:e.target.value}))} placeholder="ej: Ejercicios de Bernoulli" style={IS} onKeyDown={e=>e.key==="Enter"&&doAdd()}/></FR>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <Btn onClick={()=>setShowAdd(false)}>Cancelar</Btn>
          <Btn onClick={doAdd} primary>Registrar</Btn>
        </div>
      </Modal>
    </div>
  );
}

// ─── APP ROOT ──────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState("dashboard");
  const [data,setData]=useState(null);
  const [selSub,setSub]=useState(SUBJECTS[0].id);
  const [calMonth,setCM]=useState(new Date().getMonth());
  const [calYear,setCY]=useState(new Date().getFullYear());

  useEffect(()=>{
    const defaults=mkDefault();
    try{
      const saved=localStorage.getItem(KEY);
      setData(saved?{...defaults,...JSON.parse(saved)}:defaults);
    }catch{setData(defaults);}
  },[]);

  useEffect(()=>{
    if(data) try{localStorage.setItem(KEY,JSON.stringify(data));}catch{}
  },[data]);

  if(!data)return <div style={{background:BG,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:T2,fontSize:14}}>Cargando...</div>;

  const getP=sid=>calcPct(data,sid);
  const upEvents=[...(data.events||[])].sort((a,b)=>a.date.localeCompare(b.date)).filter(e=>e.date>=todayStr());
  const pendTodos=(data.todos||[]).filter(t=>!t.done);
  const xp=calcXP(data),lv=getLevel(xp),streak=calcStreak(data.feed||[]);

  const updTopic=(sid,idx,st)=>setData(d=>{
    const nd={...d,topicStatus:{...d.topicStatus,[sid]:{...d.topicStatus[sid],[idx]:st}}};
    if(st==="visto"){const s=SUBJECTS.find(sub=>sub.id===sid);nd.feed=[...(d.feed||[]),{id:Date.now().toString(),date:todayStr(),time:timeStr(),subjectId:sid,text:s?.topics[idx]||"Tema completado",type:"topic",xp:10}];}
    return nd;
  });
  const addEvent=ev=>setData(d=>({...d,events:[...d.events,ev]}));
  const deleteEvent=id=>setData(d=>({...d,events:d.events.filter(e=>e.id!==id)}));
  const addTodo=t=>setData(d=>({...d,todos:[...d.todos,t]}));
  const toggleTodo=id=>setData(d=>{
    const todo=(d.todos||[]).find(t=>t.id===id),newDone=!todo?.done;
    const todos=d.todos.map(t=>t.id===id?{...t,done:newDone}:t);
    let feed=d.feed||[];
    if(newDone&&todo)feed=[...feed,{id:Date.now().toString()+"_t",date:todayStr(),time:timeStr(),subjectId:todo.subjectId,text:todo.text,type:"todo",xp:5}];
    return{...d,todos,feed};
  });
  const deleteTodo=id=>setData(d=>({...d,todos:d.todos.filter(t=>t.id!==id)}));
  const updNote=(sid,note)=>setData(d=>({...d,notes:{...d.notes,[sid]:note}}));
  const updFinal=(sid,field,val)=>setData(d=>({...d,finals:{...d.finals,[sid]:{...d.finals[sid],[field]:val}}}));
  const addHoras=log=>setData(d=>({...d,horasLog:[...(d.horasLog||[]),log]}));
  const delHoras=id=>setData(d=>({...d,horasLog:(d.horasLog||[]).filter(l=>l.id!==id)}));

  const NAV=[{id:"dashboard",icon:"◈",label:"Panel"},{id:"materias",icon:"◉",label:"Materias"},{id:"calendario",icon:"◷",label:"Calendario"},{id:"pendientes",icon:"◻",label:"Pendientes"},{id:"finales",icon:"◆",label:"Finales"},{id:"estadisticas",icon:"◎",label:"Estadísticas"}];

  return(
    <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",background:BG,minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <div style={{background:CARD,borderBottom:`0.5px solid ${BD}`,padding:"11px 20px",display:"flex",alignItems:"center",gap:14,position:"sticky",top:0,zIndex:100}}>
        <div style={{width:32,height:32,background:"linear-gradient(135deg,#5BA8F5,#8B5CF6)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:16,flexShrink:0}}>◈</div>
        <div><div style={{fontWeight:500,fontSize:14,color:T1,lineHeight:1.2}}>Mi Cuatrimestre 2025</div><div style={{fontSize:10,color:T3}}>7 materias · 5 cursadas + 2 finales</div></div>
        <div style={{marginLeft:"auto",display:"flex",gap:10,alignItems:"center"}}>
          {streak>0&&<div style={{display:"flex",alignItems:"center",gap:5,background:"rgba(240,184,74,0.12)",borderRadius:20,padding:"4px 12px"}}><span style={{fontSize:14}}>🔥</span><span style={{fontSize:12,color:GOLD,fontWeight:500}}>{streak} días</span></div>}
          <div style={{display:"flex",alignItems:"center",gap:6,background:lv.color+"18",borderRadius:20,padding:"4px 12px"}}><span style={{fontSize:11,color:lv.color,fontWeight:500}}>{lv.name}</span><span style={{fontSize:11,color:T3}}>· {xp} XP</span></div>
        </div>
      </div>

      <div style={{display:"flex",flex:1}}>
        <div style={{width:160,background:CARD,borderRight:`0.5px solid ${BD}`,padding:"14px 0",flexShrink:0,display:"flex",flexDirection:"column",position:"sticky",top:54,alignSelf:"flex-start",height:"calc(100vh - 54px)",overflowY:"auto"}}>
          {NAV.map(item=>(
            <button key={item.id} onClick={()=>setView(item.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"9px 16px",border:"none",cursor:"pointer",background:view===item.id?CARD2:"transparent",color:view===item.id?T1:T2,fontSize:13,fontWeight:view===item.id?500:400,textAlign:"left",borderLeft:view===item.id?`2px solid ${BLUE}`:"2px solid transparent"}}>
              <span style={{fontSize:13,color:view===item.id?BLUE:T3}}>{item.icon}</span>{item.label}
            </button>
          ))}
          <div style={{margin:"14px 14px 6px",borderTop:`0.5px solid ${BD}`,paddingTop:14}}>
            <div style={{fontSize:9,textTransform:"uppercase",letterSpacing:"0.08em",color:T3,marginBottom:10}}>Materias</div>
            {SUBJECTS.map(s=>{
              const pct=getP(s.id);
              return(
                <div key={s.id} onClick={()=>{setSub(s.id);setView("materias");}} style={{display:"flex",alignItems:"center",gap:7,padding:"5px 0",cursor:"pointer"}}>
                  <div style={{width:6,height:6,borderRadius:s.finalOnly?0:"50%",background:s.color,flexShrink:0}}/>
                  <span style={{fontSize:10,color:T2,flex:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.short}</span>
                  <span style={{fontSize:9,color:s.color,fontWeight:500}}>{pct}%</span>
                </div>
              );
            })}
          </div>
        </div>
        <div style={{flex:1,padding:24,overflowY:"auto",minWidth:0}}>
          {view==="dashboard"   &&<Dashboard    data={data} getP={getP} setView={setView} setSub={setSub} upEvents={upEvents} pendTodos={pendTodos}/>}
          {view==="materias"    &&<Materias     data={data} selSub={selSub} setSub={setSub} updTopic={updTopic} updNote={updNote} getP={getP}/>}
          {view==="calendario"  &&<Calendario   data={data} month={calMonth} year={calYear} setMonth={setCM} setYear={setCY} addEvent={addEvent} deleteEvent={deleteEvent}/>}
          {view==="pendientes"  &&<Pendientes   data={data} addTodo={addTodo} toggleTodo={toggleTodo} deleteTodo={deleteTodo}/>}
          {view==="finales"     &&<Finales      data={data} updFinal={updFinal} getP={getP}/>}
          {view==="estadisticas"&&<Estadisticas data={data} addHoras={addHoras} delHoras={delHoras} getP={getP}/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
